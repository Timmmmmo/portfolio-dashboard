<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📊 持仓智能Dashboard</title>
<style>
:root{--bg:#0f172a;--fg:#e2e8f0;--cd:#1e293b;--bd:#334155;--sm:#64748b;--sb:#475569;--s2:#94a3b8;--s3:#cbd5e1;--s4:#38bdf8;--s5:#1a1a3e;--s6:#450a0a;--s7:#064e3b;--s8:#1e1b4b;--s9:#fbbf24;--s0:#0f172a;--sx:#1e293b}
[data-theme=light]{--bg:#f1f5f9;--fg:#1e293b;--cd:#ffffff;--bd:#cbd5e1;--sm:#64748b;--sb:#94a3b8;--s2:#64748b;--s3:#475569;--s4:#0284c7;--s5:#e2e8f0;--s6:#fef2f2;--s7:#f0fdf4;--s8:#eef2ff;--s9:#f59e0b;--s0:#ffffff;--sx:#f8fafc}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);padding:16px;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;transition:background .3s,color .3s}
h1{font-size:20px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.st{font-size:12px;color:var(--s2);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;background:#ef4444;animation:pl 2s infinite}
.dot.off{background:var(--sm);animation:none}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.4}}
.bdg{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600}
.bgo{background:var(--s6);color:#ef4444}.bgc{background:var(--cd);color:var(--s2)}
.btn{background:var(--cd);border:1px solid var(--bd);color:var(--s2);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:background .2s}
.btn:hover{background:var(--bd);color:var(--fg)}
.cd{background:var(--cd);border-radius:10px;padding:14px;border:1px solid var(--bd);margin-bottom:12px;transition:background .3s}
.ct{font-size:13px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ix{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:8px}
.ii{background:var(--s0);border-radius:8px;padding:8px;text-align:center}
.ii .n1{font-size:11px;color:var(--s2)}.ii .v1{font-size:15px;font-weight:700;margin:2px 0}.ii .p1{font-size:11px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;margin-bottom:12px}
.sc{background:var(--cd);border-radius:10px;padding:12px;border:1px solid var(--bd)}
.sc .l1{font-size:11px;color:var(--s4);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.sc .pr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sc .pr .nv{font-size:22px;font-weight:700}
.sc .pr .ch{padding:2px 8px;border-radius:4px;font-size:13px;font-weight:600}
.up{background:var(--s6);color:#ef4444}.dn{background:var(--s7);color:#34d399}.fl{background:var(--cd);color:var(--s2)}
.sc .i1{font-size:11px;color:var(--s2);padding:4px 6px;background:var(--s0);border-radius:4px;margin-top:4px;line-height:1.4}
.sc .t1{padding:2px 8px;border-radius:4px;font-size:10px;float:right;margin-top:4px}
.tb{background:var(--s6);color:#ef4444}.th{background:var(--cd);color:var(--s9)}.tw{background:var(--s7);color:#34d399}
.ni{padding:5px 0;border-bottom:1px solid var(--s0);font-size:12px;display:flex;gap:8px;align-items:flex-start}
.ni:last-child{border:none}.nt{padding:1px 6px;border-radius:3px;font-size:10px;white-space:nowrap;background:var(--s0)}
.nx{color:var(--sb);font-size:10px;white-space:nowrap}.ntx{color:var(--s3)}
.ai{padding:4px 0;font-size:12px;display:flex;gap:8px;align-items:flex-start}
.at{padding:1px 6px;border-radius:3px;font-size:10px;white-space:nowrap;background:var(--s0)}
.wc{background:linear-gradient(135deg,var(--cd),var(--s5));border-radius:8px;padding:12px;border:1px solid var(--bd);margin-bottom:8px}
.wc .wt1{font-size:13px;color:var(--s9);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.wc .wr1{font-size:11px;color:var(--s2);line-height:1.5}
.wk{display:inline-block;padding:1px 8px;border-radius:10px;font-size:10px;margin-right:4px}
.wh{background:var(--s6);color:#ef4444}.wn{background:var(--s6);color:#ef4444}.wd{background:var(--s8);color:#818cf8}
.lbx{background:var(--s0);border-radius:8px;padding:8px;margin-bottom:8px;overflow-x:auto}
.ln{font-size:10px;color:var(--sb);text-align:center;margin-top:6px}
.ld1{text-align:center;padding:20px;color:var(--sm);font-size:13px}
.sp{display:inline-block;width:14px;height:14px;border:2px solid var(--bd);border-top-color:var(--s4);border-radius:50%;animation:s .8s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes s{to{transform:rotate(360deg)}}
.ft{text-align:center;color:var(--sb);font-size:11px;padding:12px;border-top:1px solid var(--cd);margin-top:16px}
</style>
</head>
<body>

<div class="header">
  <h1>📊 持仓智能Dashboard</h1>
  <div class="st">
    <span class="dot" id="sd"></span>
    <span id="st">加载</span>
    <span id="mb"></span>
    <span id="tm">--:--</span>
    <span id="cd" style="color:#475569">--</span>
    <button class="btn" onclick="rf()">⟳</button>
    <button class="btn" id="themeBtn" onclick="toggleTheme()">☀️</button>
  </div>
</div>

<div class="cd"><div class="ix" id="ixg"></div></div>
<div class="sg" id="sg"><div class="ld1"><span class="sp"></span>加载中...</div></div>

<div class="cd" style="border-color:#fbbf24">
  <div class="ct" style="color:#fbbf24">🔭 新关注</div>
  <div id="wc"></div>
</div>

<div class="cd" style="border-color:#f97316">
  <div class="ct" style="color:#f97316">📈 连板追踪 (60日)</div>
  <div class="lbx" id="lw"><div class="ld1">扫描中...</div></div>
  <div id="ls" style="display:flex;gap:10px;flex-wrap:wrap;font-size:11px;margin:6px 0"></div>
  <div class="ln">主板≥9.90% | 科创/创业板≥19.90% | 北交所≥29.90% | 全市场5000+</div>
</div>

<div class="cd" style="border-color:#38bdf8">
  <div class="ct" style="color:#38bdf8">💰 板块资金流向 (主力净流入TOP10)</div>
  <div style="position:relative">
    <canvas id="mfChart" width="880" height="320" style="width:100%;height:300px;border-radius:8px"></canvas>
  </div>
  <div id="mfInfo" style="display:flex;gap:8px;flex-wrap:wrap;font-size:11px;color:#475569;margin-top:8px;padding:4px 0"></div>
</div>

<div class="cd"><div class="ct">📰 新闻</div><div id="nc"></div></div>
<div class="ft"><span id="ntm"></span>盘中30s | 盘后整点</div>

<script>
// ===== 主题切换 =====
function toggleTheme(){
  const h=document.documentElement;
  if(h.getAttribute('data-theme')==='light'){
    h.removeAttribute('data-theme');
    localStorage.setItem('theme','dark');
    document.getElementById('themeBtn').textContent='☀️';
  }else{
    h.setAttribute('data-theme','light');
    localStorage.setItem('theme','light');
    document.getElementById('themeBtn').textContent='🌙';
  }
}
(function(){
  try{
    if(localStorage.getItem('theme')==='light'){
      document.documentElement.setAttribute('data-theme','light');
      const tb=document.getElementById('themeBtn');
      if(tb)tb.textContent='🌙';
    }
  }catch(e){}
})();

const H=[
  {c:'hk00981',n:'中芯国际(H)',d:'AI芯片龙头',l:'最先进制程，AI芯片刚需',r:'地缘政治',k:1},
  {c:'sz000021',n:'深科技',d:'存储封测铲子',l:'HBM挤压DRAM→封测需求增',r:'HBM研发中'},
  {c:'sh603650',n:'彤程新材',d:'光刻胶替代',l:'ArF/KrF国产龙头',r:'高端验证中'},
  {c:'sh688106',n:'金宏气体',d:'特气龙头',l:'氦气不可替代+出口禁令',r:'PE偏高'},
  {c:'sh688114',n:'华大智造',d:'基因测序',l:'国产唯一，全球第三',r:'集采风险'},
  {c:'sh688507',n:'索辰科技',d:'CAE龙头',l:'国产CAE龙头',r:'客户拓展慢'},
  {c:'sz002594',n:'比亚迪',d:'新能源车',l:'销量全球第一',r:'价格战激烈'},
  {c:'sz000762',n:'西藏矿业',d:'锂矿',l:'锂矿周期底部',r:'锂价低迷'},
  {c:'sz300174',n:'元力股份',d:'超级电容',l:'底部企稳',r:'市场有限'}
];
const IX={sh000001:'sh',sz399001:'sz',sz399006:'cy',sh000688:'kc',hkHSI:'',usDJI:'',usIXIC:'',usINX:''};
const IXN={sh000001:'上证',sz399001:'深证',sz399006:'创业板',sh000688:'科创50',hkHSI:'恒生指数',usDJI:'道琼斯',usIXIC:'纳斯达克',usINX:'标普500'};
const LBD={"update_time":"2026-07-10 20:37","days":4,"data":{"2026-04-16":{"stocks":[{"code":"sh605388","name":"均瑶健康","streak":2,"sector":"主板","chg":9.96}],"count":1,"max_streak":2},"2026-05-27":{"stocks":[{"code":"sz002251","name":"步步高","streak":2,"sector":"主板","chg":12.01}],"count":1,"max_streak":2},"2026-06-30":{"stocks":[{"code":"sz000004","name":"国华退","streak":2,"sector":"主板","chg":13.33}],"count":1,"max_streak":2},"2026-07-03":{"stocks":[{"code":"sz000004","name":"国华退","streak":2,"sector":"主板","chg":12.5}],"count":1,"max_streak":2}}};
const NEWS_DATA={"update_time": "2026-07-11 18:58", "news": [], "analysis": [], "total": 0, "status": "ok"};

function ms(){
  const d=new Date(),h=d.getHours(),m=d.getMinutes(),w=d.getDay();
  const hd=['2026-01-01','2026-02-16','2026-02-17','2026-02-18','2026-02-19','2026-02-20','2026-04-06','2026-05-01','2026-06-22','2026-09-28','2026-10-01','2026-10-02','2026-10-05','2026-10-06','2026-10-07'];
  const td=d.toISOString().slice(0,10);
  const isHd=hd.includes(td);
  // A股: 09:30-15:00 周一至周五
  const aOpen=(w>0&&w<6&&!isHd)&&(h*60+m)>=570&&(h*60+m)<=900;
  // 美股: 夏令时21:30-04:00(次日) 冬令时22:30-05:00(次日) 周一至周五
  // 简单判断: 夏令时(3月-11月) 21:30-04:00
  const isSummer=(d.getMonth()>=2&&d.getMonth()<=9); // 约等于夏令时
  const usStart=isSummer?1290:1350; // 21:30=1290min, 22:30=1350min
  const usEnd=isSummer?240:300; // 04:00=240min, 05:00=300min
  let usOpen=false;
  if(w>0&&w<6&&!isHd){
    const now=h*60+m;
    if(now>=usStart||now<usEnd)usOpen=true;
  }
  // 周六早盘收尾(夏令时04:00=周六凌晨)
  if(w===6&&h<usEnd/60&&!isHd){
    const now=h*60+m;
    if(now<usEnd)usOpen=true;
  }
  return{open:aOpen,usOpen:usOpen,any:aOpen||usOpen}
}

async function fx(){
  const cs=Object.keys(IX).concat(H.map(h=>h.c)).join(',');
  try{
    const r=await fetch('https://qt.gtimg.cn/q='+cs+'&_='+Date.now(),{cache:'no-store'});
    const t=await r.text(),d={};
    t.split(';').forEach(l=>{if(!l.includes('~'))return;const e=l.indexOf('=');if(e<0)return;d[l.slice(0,e).replace('var ','').trim()]=l.slice(e+2,l.lastIndexOf('"')).split('~')});
    return d;
  }catch{return null}
}

function rd(d){
  const s=ms();
  document.getElementById('tm').textContent=new Date().toLocaleTimeString('zh-CN');
  document.getElementById('mb').innerHTML=(s.open?'<span class="bdg bgo">🟢 A股交易中</span>':(s.usOpen?'<span class="bdg bgo" style="background:#1e1b4b">🌙 美股交易中</span>':'<span class="bdg bgc">🔴 收盘</span>'));
  document.getElementById('sd').className='dot'+(s.any?'':' off');
  document.getElementById('st').textContent=s.open?'实时':s.usOpen?'夜盘':'盘后';
  if(!d){document.getElementById('sg').innerHTML='<div class="ld1">⚠️ 获取失败</div>';return}

  let xh='';
  for(const [c] of Object.entries(IX)){
    const p=d['v_'+c];let v='--',ch='--',cl='#94a3b8';
    if(p&&p.length>4){const pr=+p[3]||0,cls=+p[4]||pr,cg=cls?((pr-cls)/cls*100):0;v=pr.toFixed(2);ch=(cg>0?'+':'')+cg.toFixed(2)+'%';cl=cg>0?'#ef4444':cg<0?'#34d399':'#94a3b8'}
    const kn=c==='sh000688'?'<span style="color:#38bdf8">科创50🚀</span>':IXN[c];
    xh+=`<div class="ii"${c==='sh000688'?' style="border:1px solid #334155"':''}><div class="n1">${kn}</div><div class="v1" style="color:${cl}">${v}</div><div class="p1" style="color:${cl}">${ch}</div></div>`;
  }
  document.getElementById('ixg').innerHTML=xh;

  let sh='';
  for(const h of H){
    const p=d['v_'+h.c];let pr=0,cg=0,ps='--',cs='--',cf='fl';
    if(p&&p.length>4){const pv=+p[3]||0,cv=+p[4]||pv;cg=cv?((pv-cv)/cv*100):0;pr=pv;ps=pv.toFixed(2)+(h.k?' <span style="font-size:10px;color:#64748b">HKD</span>':'');cs=(cg>0?'+':'')+cg.toFixed(2)+'%';cf=cg>0.5?'up':cg<-0.5?'dn':'fl'}
    let tg='th',tt='持有';
    if(cg>5){tg='tb';tt='🔥'}else if(cg>2){tg='tb';tt='📈'}else if(cg<-3){tg='tw';tt='⚠️'}
    const bc=cg>0?'#ef4444':cg<0?'#34d399':'#64748b';
    sh+=`<div class="sc"><div class="l1"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${bc}"></span>${h.d}</div><div class="pr"><span class="nv">${ps}</span><span class="ch ${cf}">${cs}</span></div><div class="i1">${cg>0?'✅':'💧'}${h.l}</div><div class="i1">⚠️${h.r}</div><div class="t1 ${tg}">${tt}</div></div>`;
  }
  document.getElementById('sg').innerHTML=sh;

  // 新闻 + 逻辑判断
  const nd=NEWS_DATA;
  if(nd&&nd.news&&nd.news.length){
    let nh=nd.news.slice(0,20).map(x=>`<div class="ni"><span class="nx">${x.time||''}</span><span class="nt" style="color:#38bdf8">财联社</span><a href="${x.url||'#'}" target="_blank" rel="noopener" style="color:#cbd5e1;text-decoration:none" title="${x.title||x.content||''}">${x.title||x.content||''}</a><span style="color:#475569;font-size:9px;margin-left:3px">🔗</span></div>`).join('');
    // 在新闻下方追加逻辑判断
    if(nd.analysis&&nd.analysis.length){
      nh+='<div style="border-top:1px solid #334155;margin-top:8px;padding-top:8px;font-size:11px;color:#94a3b8;display:flex;flex-wrap:wrap;gap:6px">';
      nd.analysis.slice(0,10).forEach(a=>{
        let cl='#fbbf24';if(a.topic.includes('地缘')||a.topic.includes('风险'))cl='#34d399';if(a.topic.includes('利好')||a.topic.includes('催化'))cl='#ef4444';
        nh+=`<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:#0f172a;border-radius:4px"><span style="color:${cl};font-weight:600">${a.topic}</span><span style="color:#64748b">${a.comment}</span></span>`;
      });
      nh+='</div>';
    }
    document.getElementById('nc').innerHTML=nh;
    document.getElementById('ntm').textContent='🕐新闻:'+(nd.update_time||'--')+' | ';
  }else{
    document.getElementById('nc').innerHTML='<div class="ld1">暂无新闻，整点更新</div>';
  }

  // 关注方向
  document.getElementById('wc').innerHTML=`<div class="wc"><div class="wt1">🐵昭衍新药(实验猴) <span class="wk wh">hot</span><span class="wk wn">新方向</span></div><div class="wr1">"CXO的卖水人"——新药安全评价必须用猴子。中国最大猴群(3万只)+供给受限(繁殖需5年)+CXO投融资回暖。物理不可替代，逻辑类似氦气。参考：603127</div></div><div class="wc"><div class="wt1">🔬半导体设备 <span class="wk wh">hot</span></div><div class="wr1">参考：北方华创/中微公司</div></div><div class="wc"><div class="wt1">💊泰格医药(CXO) <span class="wk wh">hot</span></div><div class="wr1">CXO卖水人逻辑，投融资回暖+降息催化</div></div><div class="wc"><div class="wt1">📦AI应用 <span class="wk wd">趋势</span></div><div class="wr1">参考：金山办公/科大讯飞</div></div><div class="wc"><div class="wt1">⚡固态电池 <span class="wk wh">hot</span></div><div class="wr1">参考：宁德时代/当升科技</div></div>`;

  rl();
  startMF();
}

function rl(){
  const d=LBD.data,ds=Object.keys(d).sort(),w=document.getElementById('lw');
  if(!ds.length){w.innerHTML='<div class="ld1">暂无连板数据</div>';document.getElementById('ls').innerHTML='<span style="color:#64748b">最近60日无2连板</span>';return}
  const sm={};
  ds.forEach(date=>{const dd=d[date];if(!dd||!dd.stocks)return;dd.stocks.forEach(s=>{if(!sm[s.code])sm[s.code]={name:s.name,sector:s.sector,days:{}};sm[s.code].days[date]=s.streak})});
  const codes=Object.keys(sm),sd=ds.slice(-60);
  codes.sort((a,b)=>{const la=sm[a],lb=sm[b];const lda=sd.filter(x=>la.days[x]).pop(),ldb=sd.filter(x=>lb.days[x]).pop();return(ldb?lb.days[ldb]:0)-(lda?la.days[lda]:0)||la.name.localeCompare(lb.name)});
  let th='<tr><th style="color:#64748b;text-align:left;padding:4px 6px;font-weight:400;background:#0f172a">股票</th>';
  sd.forEach(d=>{th+=`<th style="color:#334155;text-align:center;padding:4px 2px;font-weight:400;font-size:9px">${d.slice(5)}</th>`});
  th+='</tr>';
  let tb='';
  codes.forEach(code=>{
    const s=sm[code];
    const st=s.sector==='科创板'?'<span style="color:#38bdf8;font-size:9px">科创</span>':s.sector==='创业板'?'<span style="color:#34d399;font-size:9px">创业</span>':'';
    tb+=`<tr><td style="padding:4px 6px;white-space:nowrap;background:#0f172a"><span style="font-weight:600">${s.name}</span>${st}</td>`;
    sd.forEach((date,i)=>{
      const sk=s.days[date];
      if(sk){
        let bg='#f97316',fg='#fff';if(sk>=7)bg='#dc2626';else if(sk>=5)bg='#ef4444';else if(sk>=3){bg='#eab308';fg='#0f172a'}else bg='#475569';
        const ps=i>0?sd[i-1]:null,np=ps?s.days[ps]:0;const ns=i<sd.length-1?sd[i+1]:null,nx=ns?s.days[ns]:0;
        tb+=`<td style="text-align:center;padding:2px"><div style="display:inline-flex;align-items:center;gap:0">${np&&sk?'<span style="color:#475569;font-size:8px">─</span>':''}<span style="display:inline-block;background:${bg};color:${fg};border-radius:3px;padding:1px 5px;font-size:10px;font-weight:700">${sk}</span>${nx&&sk?'<span style="color:#475569;font-size:8px">─</span>':''}</div></td>`;
      }else tb+='<td style="text-align:center;padding:2px"><span style="color:#1e293b">·</span></td>';
    });
    tb+='</tr>';
  });
  w.innerHTML='<table style="width:100%;border-collapse:collapse;font-size:11px;min-width:400px"><thead>'+th+'</thead><tbody>'+tb+'</tbody></table>';
  const mx=Math.max(...codes.map(c=>Math.max(...Object.values(sm[c].days))),0);
  document.getElementById('ls').innerHTML='<span style="color:#ef4444">📊'+codes.length+'只</span> <span style="color:#f97316">📈最高'+mx+'板</span> <span style="color:#64748b">🕐'+LBD.update_time+'</span>';
}

// ===== 板块资金流向 (棒棒糖图) =====
function renderMF(){
  const c=document.getElementById('mfChart');
  if(!c)return;
  const ctx=c.getContext('2d'),W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#64748b';ctx.font='14px sans-serif';ctx.textAlign='center';
  ctx.fillText('⏳ 加载资金数据...',W/2,H/2-6);
  ctx.fillStyle='#475569';ctx.font='11px sans-serif';
  ctx.fillText('每60秒自动更新',W/2,H/2+16);
  document.getElementById('mfInfo').innerHTML='<span>🔄 加载中...</span>';
  
  // JSONP
  const old=document.getElementById('mfJsonp');
  if(old)old.remove();
  const s=document.createElement('script');
  s.id='mfJsonp';
  s.src='https://push2.eastmoney.com/api/qt/clist/get?cb=mfCB&pn=1&pz=15&po=1&np=1&fields=f12,f14,f3,f62,f184,f66,f69&fid=f62&fs=m:90+t:2+f:!50&ut=b2884a393a59ad64002292a3ca90d2cb&_='+Date.now();
  document.body.appendChild(s);
  setTimeout(()=>{
    if(!window._mfData){
      const oldS=document.getElementById('mfJsonp');
      if(oldS)oldS.remove();
      renderMFFallback(ctx,W,H);
    }
  },5000);
}

// JSONP callback - 棒棒糖图 (lollipop)
function mfCB(d){
  window._mfData=d;
  const c=document.getElementById('mfChart');
  if(!c)return;
  const ctx=c.getContext('2d'),W=c.width,H=c.height;
  const data=d&&d.data&&d.data.diff;
  if(!data||!data.length)return renderMFFallback(ctx,W,H);
  
  // Sort by net inflow descending
  data.sort((a,b)=>(b.f62||0)-(a.f62||0));
  const top=data.slice(0,10);
  const maxVal=Math.max(...top.map(x=>Math.abs(x.f62||0)),1);
  const xMax=maxVal/100000000*1.2;
  
  ctx.clearRect(0,0,W,H);
  
  // Layout
  const ml=110,mr=100,mt=28,rowH=28,gap=4,chartH=top.length*(rowH+gap);
  const cw=W-ml-mr;
  
  // Title
  ctx.fillStyle='#94a3b8';ctx.font='11px sans-serif';ctx.textAlign='left';
  ctx.fillText('主力净流入(亿元)  TOP10板块',ml,mt-8);
  
  // Center axis
  const cx=ml+cw/2;
  ctx.strokeStyle='#334155';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx,mt);ctx.lineTo(cx,mt+chartH);ctx.stroke();
  
  // Axis labels
  ctx.fillStyle='#475569';ctx.font='9px sans-serif';ctx.textAlign='center';
  ctx.fillText('← 流出',cx-cw/4,mt+chartH+16);
  ctx.fillText('流入 →',cx+cw/4,mt+chartH+16);
  
  // Draw each sector
  top.forEach((item,i)=>{
    const val=(item.f62||0)/100000000;
    const name=item.f14||'';
    const chg=item.f3||0;
    const y=mt+i*(rowH+gap);
    const barW=(Math.abs(val)/xMax)*(cw/2-8);
    const isIn=val>=0;
    const color=isIn?'#ef4444':'#34d399';
    const dotR=5+Math.min(5,Math.abs(val));
    
    // Sector name (left aligned)
    ctx.fillStyle='#e2e8f0';ctx.font='12px sans-serif';ctx.textAlign='right';
    ctx.fillText(name,ml-10,y+rowH/2+4);
    
    // Bar line (stick)
    const barEnd=isIn?cx+barW:cx-barW;
    const barStart=isIn?cx+4:cx-4;
    ctx.strokeStyle=color;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(barStart,y+rowH/2);ctx.lineTo(barEnd,y+rowH/2);ctx.stroke();
    
    // Dot (lollipop head)
    ctx.fillStyle=color;
    ctx.beginPath();ctx.arc(barEnd,y+rowH/2,dotR,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#0f172a';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(barEnd,y+rowH/2,dotR,0,Math.PI*2);ctx.stroke();
    
    // Value label (next to dot)
    const vx=isIn?barEnd+dotR+5:barEnd-dotR-5;
    ctx.fillStyle=color;ctx.font='bold 11px sans-serif';
    ctx.textAlign=isIn?'left':'right';
    ctx.fillText((val>0?'+':'')+val.toFixed(2),vx,y+rowH/2+4);
    
    // Change % badge (far right)
    const chgColor=chg>0?'#ef4444':chg<0?'#34d399':'#64748b';
    ctx.fillStyle=chgColor;ctx.font='10px sans-serif';ctx.textAlign='right';
    ctx.fillText((chg>0?'+':'')+chg.toFixed(2)+'%',W-mr+80,y+rowH/2+4);
  });
  
  // Legend
  document.getElementById('mfInfo').innerHTML='<span style="display:flex;gap:12px;flex-wrap:wrap;font-size:10px">'
    +'<span>🔴 <b>主力流入</b></span>'
    +'<span style="color:#34d399">🟢 <b>主力流出</b></span>'
    +'<span style="color:#64748b">📊 <b>点越大=金额越大</b></span>'
    +'<span style="color:#64748b">🔄 盘中60秒更新</span></span>';
  window._mfData=null;
}

function renderMFFallback(ctx,W,H){
  ctx.fillStyle='#64748b';ctx.font='15px sans-serif';ctx.textAlign='center';
  ctx.fillText('⏳ 盘后暂无数据',W/2,H/2-8);
  ctx.fillStyle='#475569';ctx.font='12px sans-serif';
  ctx.fillText('每60秒自动尝试获取',W/2,H/2+16);
  document.getElementById('mfInfo').innerHTML='<span style="color:#475569">⏳ 非交易时段 · 每60秒自动获取</span>';
}

let mfTimer;
function startMF(){
  if(mfTimer)clearInterval(mfTimer);
  renderMF();
  mfTimer=setInterval(()=>{renderMF();},60000);
}

function rf(){
  const s=ms();document.getElementById('st').textContent='刷新...';
  document.getElementById('sg').innerHTML='<div class="ld1"><span class="sp"></span>获取数据...</div>';
  fx().then(d=>{rd(d);cd(s.any?30:nh())});
}

function nh(){const n=new Date();return Math.max(60,Math.floor((new Date(n.getFullYear(),n.getMonth(),n.getDate(),n.getHours()+1,0,0,0)-n)/1000))}
function cd(s){if(window._t)clearInterval(window._t);let r=s;
  window._t=setInterval(()=>{r--;const st=ms();document.getElementById('cd').textContent=st.open?r+'s':st.usOpen?r+'s🌙':new Date(Date.now()+r*1000).getHours().toString().padStart(2,'0')+':00('+Math.floor(r/60)+'分)';if(r<=0){clearInterval(window._t);rf()}},1000)}

rf();
</script>
