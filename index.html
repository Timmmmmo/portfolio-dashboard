<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📊 持仓智能Dashboard</title>
<style>
:root{--bg:#0f172a;--fg:#e2e8f0;--cd:#1e293b;--bd:#334155;--sm:#64748b;--sb:#475569;--s2:#94a3b8;--s3:#cbd5e1;--s4:#38bdf8;--s5:#1a1a3e;--s6:#450a0a;--s7:#064e3b;--s8:#1e1b4b;--s9:#fbbf24;--s0:#0f172a;--sx:#1e293b;--g1:linear-gradient(135deg,#1e293b,#0f172a);--g2:linear-gradient(135deg,#1e1b4b,#0f172a);--g3:linear-gradient(135deg,#450a0a,#1e293b);--g4:linear-gradient(135deg,#064e3b,#1e293b)}
[data-theme=light]{--bg:#f1f5f9;--fg:#1e293b;--cd:#ffffff;--bd:#cbd5e1;--sm:#64748b;--sb:#94a3b8;--s2:#64748b;--s3:#475569;--s4:#0284c7;--s5:#e2e8f0;--s6:#fef2f2;--s7:#f0fdf4;--s8:#eef2ff;--s9:#f59e0b;--s0:#ffffff;--sx:#f8fafc;--g1:linear-gradient(135deg,#fff,#f8fafc);--g2:linear-gradient(135deg,#eef2ff,#fff);--g3:linear-gradient(135deg,#fef2f2,#fff);--g4:linear-gradient(135deg,#f0fdf4,#fff)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);padding:16px;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;transition:background .3s,color .3s}
h1{font-size:20px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.st{font-size:12px;color:var(--s2);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;background:#ef4444;animation:pl 2s infinite}
.dot.off{background:var(--sm);animation:none}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.4}}
.bdg{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600}
.bgo{background:var(--s6);color:#ef4444}.bgc{background:var(--cd);color:var(--s2)}
.btn{background:var(--cd);border:1px solid var(--bd);color:var(--s2);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:background .2s}
.btn:hover{background:var(--bd);color:var(--fg)}
.cd{background:var(--cd);border-radius:10px;padding:14px;border:1px solid var(--bd);margin-bottom:12px;transition:background .3s}
.ct{font-size:13px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ix{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:8px}
.ii{background:var(--s0);border-radius:8px;padding:8px;text-align:center}
.ii .n1{font-size:11px;color:var(--s2)}.ii .v1{font-size:15px;font-weight:700;margin:2px 0}.ii .p1{font-size:11px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;margin-bottom:12px}
.sc{background:var(--cd);border-radius:10px;padding:12px;border:1px solid var(--bd)}
.sc .l1{font-size:11px;color:var(--s4);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.sc .pr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sc .pr .nv{font-size:22px;font-weight:700}
.sc .pr .ch{padding:2px 8px;border-radius:4px;font-size:13px;font-weight:600}
.up{background:var(--s6);color:#ef4444}.dn{background:var(--s7);color:#34d399}.fl{background:var(--cd);color:var(--s2)}
.sc .i1{font-size:11px;color:var(--s2);padding:4px 6px;background:var(--s0);border-radius:4px;margin-top:4px;line-height:1.4}
.sc .t1{padding:2px 8px;border-radius:4px;font-size:10px;float:right;margin-top:4px}
.tb{background:var(--s6);color:#ef4444}.th{background:var(--cd);color:var(--s9)}.tw{background:var(--s7);color:#34d399}
.ni{padding:5px 0;border-bottom:1px solid var(--s0);font-size:12px;display:flex;gap:8px;align-items:flex-start}
.ni:last-child{border:none}.nt{padding:1px 6px;border-radius:3px;font-size:10px;white-space:nowrap;background:var(--s0)}
.nx{color:var(--sb);font-size:10px;white-space:nowrap}.ntx{color:var(--s3)}
.ai{padding:4px 0;font-size:12px;display:flex;gap:8px;align-items:flex-start}
.at{padding:1px 6px;border-radius:3px;font-size:10px;white-space:nowrap;background:var(--s0)}
.wc{background:linear-gradient(135deg,var(--cd),var(--s5));border-radius:8px;padding:12px;border:1px solid var(--bd);margin-bottom:8px}
.wc .wt1{font-size:13px;color:var(--s9);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.wc .wr1{font-size:11px;color:var(--s2);line-height:1.5}
.wk{display:inline-block;padding:1px 8px;border-radius:10px;font-size:10px;margin-right:4px}
.wh{background:var(--s6);color:#ef4444}.wn{background:var(--s6);color:#ef4444}.wd{background:var(--s8);color:#818cf8}
.lbx{background:var(--s0);border-radius:8px;padding:8px;margin-bottom:8px;overflow-x:auto}
.ln{font-size:10px;color:var(--sb);text-align:center;margin-top:6px}
.ld1{text-align:center;padding:20px;color:var(--sm);font-size:13px}
.sp{display:inline-block;width:14px;height:14px;border:2px solid var(--bd);border-top-color:var(--s4);border-radius:50%;animation:s .8s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes s{to{transform:rotate(360deg)}}
.ft{text-align:center;color:var(--sb);font-size:11px;padding:12px;border-top:1px solid var(--cd);margin-top:16px}
/* FlowTree */
.ftc{background:var(--cd);border-radius:10px;padding:14px;border:1px solid var(--bd);margin-bottom:10px;transition:all .2s}
.ftc:hover{border-color:var(--s4);transform:translateY(-1px)}
.ftch{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:4px}
.ftcn{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.ftcv{font-size:12px;font-weight:600;display:flex;gap:10px;align-items:center}
.ftpo{font-size:10px;color:var(--sm);margin-bottom:6px;padding:2px 8px;background:var(--s0);border-radius:4px;display:inline-block}
.ftxy{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:6px}
@media(max-width:600px){.ftxy{grid-template-columns:1fr}}
.ftln{background:var(--s0);border-radius:6px;padding:5px 8px;display:flex;justify-content:space-between;align-items:center;font-size:11px;gap:4px}
.ftln .nm{color:var(--s3);flex-shrink:0}
.ftln .br{height:4px;border-radius:2px;flex:1;min-width:20px}
.ftln .vl{font-weight:600;white-space:nowrap;flex-shrink:0;min-width:48px;text-align:right}
.ftst{font-size:10px;color:var(--sm);margin-top:6px;padding:4px 0;display:flex;flex-wrap:wrap;gap:4px}
.ftst span{background:var(--s0);padding:1px 6px;border-radius:3px;font-size:9px}
.ftsk{font-size:10px;color:var(--s4);margin-top:4px;display:flex;gap:4px;flex-wrap:wrap}
.ftne{color:var(--sm);font-size:11px;text-align:center;padding:20px;font-style:italic}
.ft2{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:8px}
.fttag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;margin-left:4px}
.ftinfo{font-size:10px;color:var(--sm);text-align:right;margin-top:6px;padding:2px 0}
/* 资金流向图 - 动态HTML */
</style>
</head>
<body>

<div class="header">
  <h1>📊 持仓智能Dashboard</h1>
  <div class="st">
    <span class="dot" id="sd"></span>
    <span id="st">加载</span>
    <span id="mb"></span>
    <span id="tm">--:--</span>
    <span id="cd" style="color:#475569">--</span>
    <button class="btn" onclick="rf()">⟳</button>
    <button class="btn" id="themeBtn" onclick="toggleTheme()">☀️</button>
  </div>
</div>

<div class="cd"><div class="ix" id="ixg"></div></div>
<div class="sg" id="sg"><div class="ld1"><span class="sp"></span>加载中...</div></div>

<div class="cd" style="border-color:#fbbf24">
  <div class="ct" style="color:#fbbf24">🔭 新关注</div>
  <div id="wc"></div>
</div>

<div class="cd" style="border-color:#f97316">
  <div class="ct" style="color:#f97316">📈 连板追踪 (60日)</div>
  <div class="lbx" id="lw"><div class="ld1">扫描中...</div></div>
  <div id="ls" style="display:flex;gap:10px;flex-wrap:wrap;font-size:11px;margin:6px 0"></div>
  <div class="ln">主板≥9.90% | 科创/创业板≥19.90% | 北交所≥29.90% | 全市场5000+</div>
</div>

<div class="cd" style="border-color:#57e1a2;background:var(--g2)">
  <div class="ct" style="color:#57e1a2;font-size:14px">🌳 资金流树 · 政策→板块→个股</div>
  <div id="ftContainer"><div class="ld1"><span class="sp"></span>获取板块资金数据...</div></div>
  <div class="ftinfo">东方财富100行业板块 · 盘中每120秒刷新</div>
</div>

<div class="cd" style="border-color:#f97316;background:var(--g2)">
  <div class="ct" style="color:#f97316;font-size:14px">📈 收盘资金流向</div>
  <div id="cfDynamic" style="background:#fff;border-radius:8px;padding:0;min-height:400px;border:1px solid #e5e7eb">
    <div style="text-align:center;padding:50px 20px;color:#9ca3af;font-size:13px">
      <div><span class="sp"></span></div>
      <div style="margin-top:12px">⏳ 正在获取板块资金数据...</div>
    </div>
  </div>
  <div id="cfStatus" style="text-align:center;padding:3px;font-size:9px;color:#9ca3af;background:#fff;border-radius:0 0 8px 8px;margin-top:0;border:1px solid #e5e7eb;border-top:none">⏳ 首次加载中...</div>
</div>

<div class="cd"><div class="ct">📰 新闻</div><div id="nc"></div></div>
<div class="ft"><span id="ntm"></span>资金流向图30s | 持仓30s</div>

<script>
function toggleTheme(){
  const h=document.documentElement;
  if(h.getAttribute('data-theme')==='light'){
    h.removeAttribute('data-theme');
    localStorage.setItem('theme','dark');
    document.getElementById('themeBtn').textContent='☀️';
  }else{
    h.setAttribute('data-theme','light');
    localStorage.setItem('theme','light');
    document.getElementById('themeBtn').textContent='🌙';
  }
}
(function(){
  try{
    if(localStorage.getItem('theme')==='light'){
      document.documentElement.setAttribute('data-theme','light');
      const tb=document.getElementById('themeBtn');
      if(tb)tb.textContent='🌙';
    }
  }catch(e){}
})();

const H=[
  {c:'hk00981',n:'中芯国际(H)',d:'AI芯片龙头',l:'最先进制程，AI芯片刚需',r:'地缘政治',k:1},
  {c:'sz000021',n:'深科技',d:'存储封测铲子',l:'HBM挤压DRAM→封测需求增',r:'HBM研发中'},
  {c:'sh603650',n:'彤程新材',d:'光刻胶替代',l:'ArF/KrF国产龙头',r:'高端验证中'},
  {c:'sh688106',n:'金宏气体',d:'特气龙头',l:'氦气不可替代+出口禁令',r:'PE偏高'},
  {c:'sh688114',n:'华大智造',d:'基因测序',l:'国产唯一，全球第三',r:'集采风险'},
  {c:'sh688507',n:'索辰科技',d:'CAE龙头',l:'国产CAE龙头',r:'客户拓展慢'},
  {c:'sz002594',n:'比亚迪',d:'新能源车',l:'销量全球第一',r:'价格战激烈'},
  {c:'sz000762',n:'西藏矿业',d:'锂矿',l:'锂矿周期底部',r:'锂价低迷'},
  {c:'sz300174',n:'元力股份',d:'超级电容',l:'底部企稳',r:'市场有限'}
];
const IX={sh000001:'sh',sz399001:'sz',sz399006:'cy',sh000688:'kc',hkHSI:'',usDJI:'',usIXIC:'',usINX:'',jp_nk225:'',kr_kospi:''};
const IXN={sh000001:'上证',sz399001:'深证',sz399006:'创业板',sh000688:'科创50',hkHSI:'恒生指数',usDJI:'道琼斯',usIXIC:'纳斯达克',usINX:'标普500',jp_nk225:'<span style="color:#f97316">日经225🗾</span>',kr_kospi:'<span style="color:#38bdf8">韩国KOSPI🇰🇷</span>'};
const LBD={"update_time":"2026-07-10 20:37","days":4,"data":{"2026-04-16":{"stocks":[{"code":"sh605388","name":"均瑶健康","streak":2,"sector":"主板","chg":9.96}],"count":1,"max_streak":2},"2026-05-27":{"stocks":[{"code":"sz002251","name":"步步高","streak":2,"sector":"主板","chg":12.01}],"count":1,"max_streak":2},"2026-06-30":{"stocks":[{"code":"sz000004","name":"国华退","streak":2,"sector":"主板","chg":13.33}],"count":1,"max_streak":2},"2026-07-03":{"stocks":[{"code":"sz000004","name":"国华退","streak":2,"sector":"主板","chg":12.5}],"count":1,"max_streak":2}}};
const NEWS_DATA={"update_time": "2026-07-11 18:58", "news": [], "analysis": [], "total": 0, "status": "ok"};

function ms(){
  const d=new Date(),h=d.getHours(),m=d.getMinutes(),w=d.getDay();
  const hd=['2026-01-01','2026-02-16','2026-02-17','2026-02-18','2026-02-19','2026-02-20','2026-04-06','2026-05-01','2026-06-22','2026-09-28','2026-10-01','2026-10-02','2026-10-05','2026-10-06','2026-10-07'];
  const td=d.toISOString().slice(0,10);
  const isHd=hd.includes(td);
  const aOpen=(w>0&&w<6&&!isHd)&&(h*60+m)>=570&&(h*60+m)<=900;
  const isSummer=(d.getMonth()>=2&&d.getMonth()<=9);
  const usStart=isSummer?1290:1350;
  const usEnd=isSummer?240:300;
  let usOpen=false;
  if(w>0&&w<6&&!isHd){const now=h*60+m;if(now>=usStart||now<usEnd)usOpen=true;}
  if(w===6&&h<usEnd/60&&!isHd){const now=h*60+m;if(now<usEnd)usOpen=true;}
  const jpOpen=(w>0&&w<6&&!isHd)&&(h*60+m)>=480&&(h*60+m)<840;
  const krOpen=(w>0&&w<6&&!isHd)&&(h*60+m)>=480&&(h*60+m)<870;
  return{open:aOpen,usOpen:usOpen,any:aOpen||usOpen,jpOpen:jpOpen,krOpen:krOpen}
}

async function fx(){
  const cs=Object.keys(IX).concat(H.map(h=>h.c)).join(',');
  try{
    const r=await fetch('https://qt.gtimg.cn/q='+cs+'&_='+Date.now(),{cache:'no-store'});
    const t=await r.text(),d={};
    t.split(';').forEach(l=>{if(!l.includes('~'))return;const e=l.indexOf('=');if(e<0)return;d[l.slice(0,e).replace('var ','').trim()]=l.slice(e+2,l.lastIndexOf('"')).split('~')});
    try{
      const r2=await fetch('https://hq.sinajs.cn/list=int_nk225,int_kospi',{headers:{'Referer':'https://finance.sina.com.cn'}});
      const t2=await r2.text();
      t2.split(';').forEach(l=>{if(!l.includes('='))return;const k=l.split('=')[0].trim();const v=l.split('=')[1].trim().slice(1,-1).split(',');if(v&&v.length>1)d[k]=v});
    }catch(e){}
    return d;
  }catch{return null}
}

function rd(d){
  const s=ms();
  document.getElementById('tm').textContent=new Date().toLocaleTimeString('zh-CN');
  let badge='<span class="bdg bgc">🔴 收盘</span>';
  if(s.open)badge='<span class="bdg bgo">🟢 A股交易中</span>';
  else if(s.jpOpen)badge='<span class="bdg bgo" style="background:#1e1b4b;color:#f97316">🗾 日股交易中</span>';
  else if(s.krOpen)badge='<span class="bdg bgo" style="background:#1e1b4b;color:#38bdf8">🇰🇷 韩股交易中</span>';
  else if(s.usOpen)badge='<span class="bdg bgo" style="background:#1e1b4b">🌙 美股交易中</span>';
  document.getElementById('mb').innerHTML=badge;
  document.getElementById('sd').className='dot'+(s.any?'':' off');
  let statusText='盘后';
  if(s.open)statusText='实时';
  else if(s.jpOpen||s.krOpen)statusText='亚盘';
  else if(s.usOpen)statusText='夜盘';
  document.getElementById('st').textContent=statusText;
  if(!d){document.getElementById('sg').innerHTML='<div class="ld1">⚠️ 获取失败</div>';return}

  let xh='';
  for(const [c] of Object.entries(IX)){
    const p=d['v_'+c]||d['hq_str_'+c];let v='--',ch='--',cl='#94a3b8';
    if(p&&p.length>4){
      const isSina=c.startsWith('jp_')||c.startsWith('kr_');
      if(isSina){const pr=+p[1]||0,prev=+p[2]||pr;if(pr&&prev){const cg=prev?((pr-prev)/prev*100):0;v=pr.toFixed(2);ch=(cg>0?'+':'')+cg.toFixed(2)+'%';cl=cg>0?'#ef4444':cg<0?'#34d399':'#94a3b8'}
      }else{const pr=+p[3]||0,cls=+p[4]||pr,cg=cls?((pr-cls)/cls*100):0;v=pr.toFixed(2);ch=(cg>0?'+':'')+cg.toFixed(2)+'%';cl=cg>0?'#ef4444':cg<0?'#34d399':'#94a3b8'}
    }
    const kn=c==='sh000688'?'<span style="color:#38bdf8">科创50🚀</span>':IXN[c];
    xh+=`<div class="ii"${c==='sh000688'?' style="border:1px solid #334155"':''}><div class="n1">${kn}</div><div class="v1" style="color:${cl}">${v}</div><div class="p1" style="color:${cl}">${ch}</div></div>`;
  }
  document.getElementById('ixg').innerHTML=xh;

  let sh='';
  for(const h of H){
    const p=d['v_'+h.c];let pr=0,cg=0,ps='--',cs='--',cf='fl';
    if(p&&p.length>4){const pv=+p[3]||0,cv=+p[4]||pv;cg=cv?((pv-cv)/cv*100):0;pr=pv;ps=pv.toFixed(2)+(h.k?' <span style="font-size:10px;color:#64748b">HKD</span>':'');cs=(cg>0?'+':'')+cg.toFixed(2)+'%';cf=cg>0.5?'up':cg<-0.5?'dn':'fl'}
    let tg='th',tt='持有';
    if(cg>5){tg='tb';tt='🔥'}else if(cg>2){tg='tb';tt='📈'}else if(cg<-3){tg='tw';tt='⚠️'}
    const bc=cg>0?'#ef4444':cg<0?'#34d399':'#64748b';
    sh+=`<div class="sc"><div class="l1"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${bc}"></span>${h.d}</div><div class="pr"><span class="nv">${ps}</span><span class="ch ${cf}">${cs}</span></div><div class="i1">${cg>0?'✅':'💧'}${h.l}</div><div class="i1">⚠️${h.r}</div><div class="t1 ${tg}">${tt}</div></div>`;
  }
  document.getElementById('sg').innerHTML=sh;

  const nd=NEWS_DATA;
  if(nd&&nd.news&&nd.news.length){
    let nh=nd.news.slice(0,20).map(x=>`<div class="ni"><span class="nx">${x.time||''}</span><span class="nt" style="color:#38bdf8">财联社</span><a href="${x.url||'#'}" target="_blank" rel="noopener" style="color:#cbd5e1;text-decoration:none" title="${x.title||x.content||''}">${x.title||x.content||''}</a><span style="color:#475569;font-size:9px;margin-left:3px">🔗</span></div>`).join('');
    if(nd.analysis&&nd.analysis.length){
      nh+='<div style="border-top:1px solid #334155;margin-top:8px;padding-top:8px;font-size:11px;color:#94a3b8;display:flex;flex-wrap:wrap;gap:6px">';
      nd.analysis.slice(0,10).forEach(a=>{let cl='#fbbf24';if(a.topic.includes('地缘')||a.topic.includes('风险'))cl='#34d399';if(a.topic.includes('利好')||a.topic.includes('催化'))cl='#ef4444';nh+=`<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:#0f172a;border-radius:4px"><span style="color:${cl};font-weight:600">${a.topic}</span><span style="color:#64748b">${a.comment}</span></span>`;});
      nh+='</div>';
    }
    document.getElementById('nc').innerHTML=nh;

function renderCFDynamic(){
  const el=document.getElementById('cfDynamic');
  if(!el)return;
  const names=Object.keys(sectorHistory);
  if(!names.length){
    el.innerHTML=`<div style="text-align:center;padding:50px 20px;color:#9ca3af;font-size:13px;background:#fff;border-radius:8px">
      <div><span class="sp"></span></div>
      <div style="margin-top:12px">⏳ 正在获取板块资金数据...</div>
    </div>`;
    return;
  }

  const latest={};
  names.forEach(n=>{const h=sectorHistory[n];if(h.length)latest[n]=h[h.length-1].flow;});
  const topNames=Object.keys(latest).sort((a,b)=>Math.abs(latest[b])-Math.abs(latest[a])).slice(0,10);
  if(!topNames.length)return;

  let maxVal=10;
  topNames.forEach(n=>{sectorHistory[n].forEach(h=>{const a=Math.abs(h.flow);if(a>maxVal)maxVal=a;});});
  maxVal=Math.ceil(maxVal*1.25/10)*10;

  // Color mapping: warm for positive, cool for negative
  const warmColors=['#dc2626','#ea580c','#d97706','#ca8a04','#a16207','#e11d48','#be123c','#f97316'];
  const coolColors=['#16a34a','#059669','#0284c7','#2563eb','#6366f1','#0891b2','#0d9488','#4f46e5'];
  function getColor(n,idx){
    const f=latest[n]||0;
    if(f>0)return warmColors[idx%warmColors.length];
    return coolColors[idx%coolColors.length];
  }

  // SVG dimensions
  const svgW=880, svgH=480, padL=50, padR=120, padT=45, padB=35;
  const chartW=svgW-padL-padR, chartH=svgH-padT-padB;
  const midY=padT+chartH/2;

  function toX(i,total){return padL+(i/(total-1||1))*chartW;}
  function toY(v){return midY-(v/maxVal)*(chartH/2);}

  const allTimes=new Set();
  topNames.forEach(n=>{sectorHistory[n].forEach(h=>allTimes.add(h.t));});
  const times=Array.from(allTimes).sort();
  if(times.length<2)return;

  const lines=topNames.map((n,ci)=>{
    const pts=sectorHistory[n].filter(h=>times.includes(h.t));
    if(pts.length<2)return null;
    const points=pts.map((h,i)=>`${toX(i,pts.length).toFixed(1)},${toY(h.flow).toFixed(1)}`).join(' ');
    const color=getColor(n,ci);
    return {name:n,points,color,flow:latest[n],ptsLen:pts.length};
  }).filter(Boolean);
  // Sort by flow value descending
  lines.sort((a,b)=>b.flow-a.flow);

  // Grid
  let yGrid='';
  for(let i=-8;i<=8;i++){
    if(i===0)continue;
    const y=toY(maxVal*i/8);
    yGrid+=`<line x1="${padL}" y1="${y}" x2="${padL+chartW}" y2="${y}" stroke="#e5e7eb" stroke-width="0.5"/>`;
  }
  yGrid+=`<line x1="${padL}" y1="${midY}" x2="${padL+chartW}" y2="${midY}" stroke="#d1d5db" stroke-width="1"/>`;

  // Y-axis labels
  let yLabels='';
  for(let i=-8;i<=8;i++){
    if(i===0)continue;
    const y=toY(maxVal*i/8);
    if(i%2===0){
      yLabels+=`<text x="${padL-8}" y="${y+4}" fill="#9ca3af" font-size="11" text-anchor="end">${(maxVal*i/8).toFixed(0)}</text>`;
    }
  }
  yLabels+=`<text x="${padL-8}" y="${midY+4}" fill="#9ca3af" font-size="11" text-anchor="end">0</text>`;
  yLabels+=`<text x="${padL-2}" y="${midY-8}" fill="#9ca3af" font-size="10" text-anchor="start">亿</text>`;

  // X-axis labels
  const xMarkers=[{t:570,l:'09:30'},{t:630,l:'10:30'},{t:690,l:'11:30'},{t:780,l:'13:00'},{t:840,l:'14:00'},{t:900,l:'15:00'}];

  // Polylines
  let polylines='';
  lines.forEach(l=>{
    polylines+=`<polyline points="${l.points}" fill="none" stroke="${l.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>`;
    // Latest point dot
    const pts=l.points.split(' ');
    const lastPt=pts[pts.length-1];
    if(lastPt){
      const [lx,ly]=lastPt.split(',');
      polylines+=`<circle cx="${lx}" cy="${ly}" r="4" fill="${l.color}" stroke="#fff" stroke-width="1.5"/>`;
    }
  });

  // Right-side labels
  let rightLabels='';
  lines.forEach(l=>{
    const pts=l.points.split(' ');
    const lastPt=pts[pts.length-1];
    if(!lastPt)return;
    const [lx,ly]=lastPt.split(',');
    const sign=l.flow>=0?'+':'';
    const labelX=padL+chartW+8;
    const labelY=parseFloat(ly);
    const bg=l.flow>=0?'#fff':'#fff';
    const txtColor=l.flow>=0?'#dc2626':'#16a34a';
    rightLabels+=`
      <g>
        <rect x="${labelX}" y="${labelY-12}" width="100" height="22" rx="4" fill="white" stroke="${l.color}" stroke-width="1.5"/>
        <text x="${labelX+8}" y="${labelY+4}" fill="#374151" font-size="10" font-weight="600" font-family="sans-serif">${l.name}</text>
        <text x="${labelX+8}" y="${labelY+16}" fill="${txtColor}" font-size="9" font-family="sans-serif">${sign}${l.flow.toFixed(2)}</text>
      </g>`;
  });

  // X-axis lines + labels
  let xAxisHtml='';
  xMarkers.forEach(m=>{
    const x=padL+((m.t-570)/(900-570))*chartW;
    xAxisHtml+=`<text x="${x}" y="${svgH-8}" fill="#9ca3af" font-size="11" text-anchor="middle" font-family="sans-serif">${m.l}</text>`;
    xAxisHtml+=`<line x1="${x}" y1="${padT}" x2="${x}" y2="${padT+chartH}" stroke="#f3f4f6" stroke-width="0.5"/>`;
  });

  el.innerHTML=`<div style="background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);font-family:sans-serif">
    <div style="padding:10px 14px 4px;text-align:center">
      <div style="font-size:18px;font-weight:900;color:#fbbf24;text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000;letter-spacing:2px">7月22日收盘资金流向</div>
    </div>
    <svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" style="display:block;width:100%;height:auto">
      ${yGrid}
      ${xAxisHtml}
      ${polylines}
      ${yLabels}
      ${rightLabels}
    </svg>
    <div style="display:flex;justify-content:space-between;padding:2px 14px 6px;font-size:9px;color:#9ca3af">
      <span>${lines.length}个板块 · ${times.length}个采集点</span>
      <span>数据:东方财富100行业板块</span>
    </div>
  </div>`;
}

function cfProcessData(d){
  const data=d&&d.data&&d.data.diff;
  if(!data||!data.length)return;
  const now=new Date();
  const tStr=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  // 首次运行：初始化所有板块的历史
  if(!Object.keys(sectorHistory).length){
    data.forEach(x=>{
      const name=(x.f14||'').trim();
      if(!name)return;
      sectorHistory[name]=[];
    });
  }
  // 追加新数据点
  data.forEach(x=>{
    const name=(x.f14||'').trim();
    const flow=((x.f62||0)/100000000);
    if(!name)return;
    if(!sectorHistory[name])sectorHistory[name]=[];
    sectorHistory[name].push({t:tStr,flow});
    if(sectorHistory[name].length>60)sectorHistory[name].shift();
  });
  // 清理旧板块（已不再出现的）
  const currentNames=new Set(data.map(x=>(x.f14||'').trim()).filter(Boolean));
  Object.keys(sectorHistory).forEach(n=>{if(!currentNames.has(n))delete sectorHistory[n];});
  // 保存缓存
  try{const cache={};Object.keys(sectorHistory).forEach(n=>{cache[n]=sectorHistory[n].slice(-20);});localStorage.setItem('sectorHist',JSON.stringify(cache));}catch(e){}
  renderCFDynamic();
}

function cfCB(d){
  const os=document.getElementById('cfJsonp');
  if(os)os.remove();
  cfProcessData(d);
  if(!d||!d.data||!d.data.diff||!d.data.diff.length){
    const st=document.getElementById('cfStatus');
    if(st)st.textContent='⚠️ 数据为空('+new Date().toLocaleTimeString()+')，等待回源...';
  }
}

      const spike = Math.sin(wavePhase*4 + di*3) * 15;
      const noise = (Math.random()-0.5)*20;
      const flow = trend + cycle + spike + noise;
      if(!sectorHistory[d.n])sectorHistory[d.n]=[];
      sectorHistory[d.n].push({t:ts,flow:flow});
    });
  }
  renderCFDynamic();
}

function startCF(){
  if(cfTimer)clearInterval(cfTimer);
  // 加载缓存
  try{const c=localStorage.getItem('sectorHist');if(c){const p=JSON.parse(c);Object.keys(p).forEach(n=>{sectorHistory[n]=p[n];});}}catch(e){}
  fetchCFData();
  renderCFDynamic();
  cfTimer=setInterval(()=>{
    const st=ms();
    if(st.open||st.usOpen||st.jpOpen||st.krOpen)fetchCFData();
    else{renderCFDynamic();}
  },30000);
}

// ===== 资金流树 (120秒刷新) =====
let ftTimer;

function renderFT(){
  const old=document.getElementById('ftJsonp');
  if(old)old.remove();
  const s=document.createElement('script');
  s.id='ftJsonp';
  s.src='https://push2.eastmoney.com/api/qt/clist/get?cb=ftCB&pn=1&pz=100&po=1&np=1&fields=f12,f14,f3,f62,f184,f66,f69&fid=f62&fs=m:90+t:2+f:!50&ut=b2884a393a59ad64002292a3ca90d2cb&_='+Date.now();
  document.body.appendChild(s);
}

function ftCB(d){
  const data=d&&d.data&&d.data.diff;
  if(data&&data.length){
    renderFTFromData(data);
    // Also update sectorHistory for the chart
    const now=new Date();
    const tStr=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    data.forEach(x=>{
      const name=(x.f14||'').trim();
      const flow=((x.f62||0)/100000000);
      if(!name)return;
      if(!sectorHistory[name])sectorHistory[name]=[];
      sectorHistory[name].push({t:tStr,flow});
      if(sectorHistory[name].length>60)sectorHistory[name].shift();
    });
    renderCFDynamic();
  }
  const oldS=document.getElementById('ftJsonp');
  if(oldS)oldS.remove();
}

function startFT(){
  if(ftTimer)clearInterval(ftTimer);
  // Load cached
  try{const c=localStorage.getItem('cfHist');if(c){const p=JSON.parse(c);if(p&&p.length)cfHistory=p;}}catch(e){}
  renderFT();
  ftTimer=setInterval(()=>{const st=ms();if(st.open||st.usOpen)renderFT();},120000);
}

function rf(){
  const s=ms();document.getElementById('st').textContent='刷新...';
  document.getElementById('sg').innerHTML='<div class="ld1"><span class="sp"></span>获取数据...</div>';
  fx().then(d=>{rd(d);cd(s.any?30:nh())});
}

function nh(){const n=new Date();return Math.max(60,Math.floor((new Date(n.getFullYear(),n.getMonth(),n.getDate(),n.getHours()+1,0,0,0)-n)/1000))}
function cd(s){if(window._t)clearInterval(window._t);let r=s;
  window._t=setInterval(()=>{r--;const st=ms();document.getElementById('cd').textContent=st.open?r+'s':st.jpOpen||st.krOpen?r+'s🌏':st.usOpen?r+'s🌙':new Date(Date.now()+r*1000).getHours().toString().padStart(2,'0')+':00('+Math.floor(r/60)+'分)';if(r<=0){clearInterval(window._t);rf()}},1000)}

rf();
startFT();
startCF();
</script>
