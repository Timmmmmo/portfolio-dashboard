<script>
// ===== дё»йўҳеҲҮжҚў =====
function toggleTheme(){
  const h=document.documentElement;
  if(h.getAttribute('data-theme')==='light'){
    h.removeAttribute('data-theme');
    localStorage.setItem('theme','dark');
    document.getElementById('themeBtn').textContent='вҳҖпёҸ';
  }else{
    h.setAttribute('data-theme','light');
    localStorage.setItem('theme','light');
    document.getElementById('themeBtn').textContent='рҹҢҷ';
  }
}
(function(){
  try{
    if(localStorage.getItem('theme')==='light'){
      document.documentElement.setAttribute('data-theme','light');
      const tb=document.getElementById('themeBtn');
      if(tb)tb.textContent='рҹҢҷ';
    }
  }catch(e){}
})();

const H=[
  {c:'hk00981',n:'дёӯиҠҜеӣҪйҷ…(H)',d:'AIиҠҜзүҮйҫҷеӨҙ',l:'жңҖе…ҲиҝӣеҲ¶зЁӢпјҢAIиҠҜзүҮеҲҡйңҖ',r:'ең°зјҳж”ҝжІ»',k:1},
  {c:'sz000021',n:'ж·ұз§‘жҠҖ',d:'еӯҳеӮЁе°ҒжөӢй“Іеӯҗ',l:'HBMжҢӨеҺӢDRAMвҶ’е°ҒжөӢйңҖжұӮеўһ',r:'HBMз ”еҸ‘дёӯ'},
  {c:'sh603650',n:'еҪӨзЁӢж–°жқҗ',d:'е…үеҲ»иғ¶жӣҝд»Ј',l:'ArF/KrFеӣҪдә§йҫҷеӨҙ',r:'й«ҳз«ҜйӘҢиҜҒдёӯ'},
  {c:'sh688106',n:'йҮ‘е®Ҹж°”дҪ“',d:'зү№ж°”йҫҷеӨҙ',l:'ж°Ұж°”дёҚеҸҜжӣҝд»Ј+еҮәеҸЈзҰҒд»Ө',r:'PEеҒҸй«ҳ'},
  {c:'sh688114',n:'еҚҺеӨ§жҷәйҖ ',d:'еҹәеӣ жөӢеәҸ',l:'еӣҪдә§е”ҜдёҖпјҢе…Ёзҗғз¬¬дёү',r:'йӣҶйҮҮйЈҺйҷ©'},
  {c:'sh688507',n:'зҙўиҫ°з§‘жҠҖ',d:'CAEйҫҷеӨҙ',l:'еӣҪдә§CAEйҫҷеӨҙ',r:'е®ўжҲ·жӢ“еұ•ж…ў'},
  {c:'sz002594',n:'жҜ”дәҡиҝӘ',d:'ж–°иғҪжәҗиҪҰ',l:'й”ҖйҮҸе…Ёзҗғз¬¬дёҖ',r:'д»·ж јжҲҳжҝҖзғҲ'},
  {c:'sz000762',n:'иҘҝи—Ҹзҹҝдёҡ',d:'й”Ӯзҹҝ',l:'й”Ӯзҹҝе‘Ёжңҹеә•йғЁ',r:'й”Ӯд»·дҪҺиҝ·'},
  {c:'sz300174',n:'е…ғеҠӣиӮЎд»Ҫ',d:'и¶…зә§з”өе®№',l:'еә•йғЁдјҒзЁі',r:'еёӮеңәжңүйҷҗ'}
];
const IX={sh000001:'sh',sz399001:'sz',sz399006:'cy',sh000688:'kc',hkHSI:'',usDJI:'',usIXIC:'',usINX:'',jp_nk225:'',kr_kospi:''};
const IXN={sh000001:'дёҠиҜҒ',sz399001:'ж·ұиҜҒ',sz399006:'еҲӣдёҡжқҝ',sh000688:'з§‘еҲӣ50',hkHSI:'жҒ’з”ҹжҢҮж•°',usDJI:'йҒ“зҗјж–Ҝ',usIXIC:'зәіж–Ҝиҫҫе…Ӣ',usINX:'ж Үжҷ®500',jp_nk225:'<span style="color:#f97316">ж—Ҙз»Ҹ225рҹ—ҫ</span>',kr_kospi:'<span style="color:#38bdf8">йҹ©еӣҪKOSPIрҹҮ°рҹҮ·</span>'};
const LBD={"update_time":"2026-07-10 20:37","days":4,"data":{"2026-04-16":{"stocks":[{"code":"sh605388","name":"еқҮз‘¶еҒҘеә·","streak":2,"sector":"дё»жқҝ","chg":9.96}],"count":1,"max_streak":2},"2026-05-27":{"stocks":[{"code":"sz002251","name":"жӯҘжӯҘй«ҳ","streak":2,"sector":"дё»жқҝ","chg":12.01}],"count":1,"max_streak":2},"2026-06-30":{"stocks":[{"code":"sz000004","name":"еӣҪеҚҺйҖҖ","streak":2,"sector":"дё»жқҝ","chg":13.33}],"count":1,"max_streak":2},"2026-07-03":{"stocks":[{"code":"sz000004","name":"еӣҪеҚҺйҖҖ","streak":2,"sector":"дё»жқҝ","chg":12.5}],"count":1,"max_streak":2}}};
const NEWS_DATA={"update_time": "2026-07-11 18:58", "news": [], "analysis": [], "total": 0, "status": "ok"};

function ms(){
  const d=new Date(),h=d.getHours(),m=d.getMinutes(),w=d.getDay();
  const hd=['2026-01-01','2026-02-16','2026-02-17','2026-02-18','2026-02-19','2026-02-20','2026-04-06','2026-05-01','2026-06-22','2026-09-28','2026-10-01','2026-10-02','2026-10-05','2026-10-06','2026-10-07'];
  const td=d.toISOString().slice(0,10);
  const isHd=hd.includes(td);
  // AиӮЎ: 09:30-15:00 е‘ЁдёҖиҮіе‘Ёдә”
  const aOpen=(w>0&&w<6&&!isHd)&&(h*60+m)>=570&&(h*60+m)<=900;
  // зҫҺиӮЎ: еӨҸд»Өж—¶21:30-04:00(ж¬Ўж—Ҙ) еҶ¬д»Өж—¶22:30-05:00(ж¬Ўж—Ҙ) е‘ЁдёҖиҮіе‘Ёдә”
  // з®ҖеҚ•еҲӨж–ӯ: еӨҸд»Өж—¶(3жңҲ-11жңҲ) 21:30-04:00
  const isSummer=(d.getMonth()>=2&&d.getMonth()<=9); // зәҰзӯүдәҺеӨҸд»Өж—¶
  const usStart=isSummer?1290:1350; // 21:30=1290min, 22:30=1350min
  const usEnd=isSummer?240:300; // 04:00=240min, 05:00=300min
  let usOpen=false;
  if(w>0&&w<6&&!isHd){
    const now=h*60+m;
    if(now>=usStart||now<usEnd)usOpen=true;
  }
  // е‘Ёе…ӯж—©зӣҳж”¶е°ҫ(еӨҸд»Өж—¶04:00=е‘Ёе…ӯеҮҢжҷЁ)
  if(w===6&&h<usEnd/60&&!isHd){
    const now=h*60+m;
    if(now<usEnd)usOpen=true;
  }
  // ж—ҘиӮЎ: 08:00-14:00 е‘ЁдёҖиҮіе‘Ёдә”
  const jpOpen=(w>0&&w<6&&!isHd)&&(h*60+m)>=480&&(h*60+m)<840;
  // йҹ©иӮЎ: 08:00-14:30 е‘ЁдёҖиҮіе‘Ёдә”
  const krOpen=(w>0&&w<6&&!isHd)&&(h*60+m)>=480&&(h*60+m)<870;
  return{open:aOpen,usOpen:usOpen,any:aOpen||usOpen,jpOpen:jpOpen,krOpen:krOpen}
}

async function fx(){
  const cs=Object.keys(IX).concat(H.map(h=>h.c)).join(',');
  try{
    const r=await fetch('https://qt.gtimg.cn/q='+cs+'&_='+Date.now(),{cache:'no-store'});
    const t=await r.text(),d={};
    t.split(';').forEach(l=>{if(!l.includes('~'))return;const e=l.indexOf('=');if(e<0)return;d[l.slice(0,e).replace('var ','').trim()]=l.slice(e+2,l.lastIndexOf('"')).split('~')});
    // Also fetch JP/KR from Sina
    try{
      const r2=await fetch('https://hq.sinajs.cn/list=int_nk225,int_kospi',{headers:{'Referer':'https://finance.sina.com.cn'}});
      const t2=await r2.text();
      t2.split(';').forEach(l=>{if(!l.includes('='))return;const k=l.split('=')[0].trim();const v=l.split('=')[1].trim().slice(1,-1).split(',');if(v&&v.length>1)d[k]=v});
    }catch(e){}
    return d;
  }catch{return null}
}

function rd(d){
  const s=ms();
  document.getElementById('tm').textContent=new Date().toLocaleTimeString('zh-CN');
  // Multi-market status badge
  let badge='<span class="bdg bgc">рҹ”ҙ ж”¶зӣҳ</span>';
  if(s.open)badge='<span class="bdg bgo">рҹҹў AиӮЎдәӨжҳ“дёӯ</span>';
  else if(s.jpOpen)badge='<span class="bdg bgo" style="background:#1e1b4b;color:#f97316">рҹ—ҫ ж—ҘиӮЎдәӨжҳ“дёӯ</span>';
  else if(s.krOpen)badge='<span class="bdg bgo" style="background:#1e1b4b;color:#38bdf8">рҹҮ°рҹҮ· йҹ©иӮЎдәӨжҳ“дёӯ</span>';
  else if(s.usOpen)badge='<span class="bdg bgo" style="background:#1e1b4b">рҹҢҷ зҫҺиӮЎдәӨжҳ“дёӯ</span>';
  document.getElementById('mb').innerHTML=badge;
  document.getElementById('sd').className='dot'+(s.any?'':' off');
  let statusText='зӣҳеҗҺ';
  if(s.open)statusText='е®һж—¶';
  else if(s.jpOpen||s.krOpen)statusText='дәҡзӣҳ';
  else if(s.usOpen)statusText='еӨңзӣҳ';
  document.getElementById('st').textContent=statusText;
  if(!d){document.getElementById('sg').innerHTML='<div class="ld1">вҡ пёҸ иҺ·еҸ–еӨұиҙҘ</div>';return}

  let xh='';
  for(const [c] of Object.entries(IX)){
    const p=d['v_'+c]||d['hq_str_'+c];let v='--',ch='--',cl='#94a3b8';
    if(p&&p.length>4){
      // Sina format: [name, price, change%] or Tencent: [1, name, ..., price, prev_close, ...]
      const isSina=c.startsWith('jp_')||c.startsWith('kr_');
      if(isSina){
        const pr=+p[1]||0,prev=+p[2]||pr;
        if(pr&&prev){const cg=prev?((pr-prev)/prev*100):0;v=pr.toFixed(2);ch=(cg>0?'+':'')+cg.toFixed(2)+'%';cl=cg>0?'#ef4444':cg<0?'#34d399':'#94a3b8'}
      }else{
        const pr=+p[3]||0,cls=+p[4]||pr,cg=cls?((pr-cls)/cls*100):0;v=pr.toFixed(2);ch=(cg>0?'+':'')+cg.toFixed(2)+'%';cl=cg>0?'#ef4444':cg<0?'#34d399':'#94a3b8'
      }
    }
    const kn=c==='sh000688'?'<span style="color:#38bdf8">з§‘еҲӣ50рҹҡҖ</span>':IXN[c];
    xh+=`<div class="ii"${c==='sh000688'?' style="border:1px solid #334155"':''}><div class="n1">${kn}</div><div class="v1" style="color:${cl}">${v}</div><div class="p1" style="color:${cl}">${ch}</div></div>`;
  }
  document.getElementById('ixg').innerHTML=xh;

  let sh='';
  for(const h of H){
    const p=d['v_'+h.c];let pr=0,cg=0,ps='--',cs='--',cf='fl';
    if(p&&p.length>4){const pv=+p[3]||0,cv=+p[4]||pv;cg=cv?((pv-cv)/cv*100):0;pr=pv;ps=pv.toFixed(2)+(h.k?' <span style="font-size:10px;color:#64748b">HKD</span>':'');cs=(cg>0?'+':'')+cg.toFixed(2)+'%';cf=cg>0.5?'up':cg<-0.5?'dn':'fl'}
    let tg='th',tt='жҢҒжңү';
    if(cg>5){tg='tb';tt='рҹ”Ҙ'}else if(cg>2){tg='tb';tt='рҹ“Ҳ'}else if(cg<-3){tg='tw';tt='вҡ пёҸ'}
    const bc=cg>0?'#ef4444':cg<0?'#34d399':'#64748b';
    sh+=`<div class="sc"><div class="l1"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${bc}"></span>${h.d}</div><div class="pr"><span class="nv">${ps}</span><span class="ch ${cf}">${cs}</span></div><div class="i1">${cg>0?'вң…':'рҹ’§'}${h.l}</div><div class="i1">вҡ пёҸ${h.r}</div><div class="t1 ${tg}">${tt}</div></div>`;
  }
  document.getElementById('sg').innerHTML=sh;

  // ж–°й—» + йҖ»иҫ‘еҲӨж–ӯ
  const nd=NEWS_DATA;
  if(nd&&nd.news&&nd.news.length){
    let nh=nd.news.slice(0,20).map(x=>`<div class="ni"><span class="nx">${x.time||''}</span><span class="nt" style="color:#38bdf8">иҙўиҒ”зӨҫ</span><a href="${x.url||'#'}" target="_blank" rel="noopener" style="color:#cbd5e1;text-decoration:none" title="${x.title||x.content||''}">${x.title||x.content||''}</a><span style="color:#475569;font-size:9px;margin-left:3px">рҹ”—</span></div>`).join('');
    // еңЁж–°й—»дёӢж–№иҝҪеҠ йҖ»иҫ‘еҲӨж–ӯ
    if(nd.analysis&&nd.analysis.length){

        nh+=`<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:#0f172a;border-radius:4px"><span style="color:${cl};font-weight:600">${a.topic}</span><span style="color:#64748b">${a.comment}</span></span>`;

  }else{
    document.getElementById('nc').innerHTML='<div class="ld1">жҡӮж— ж–°й—»пјҢж•ҙзӮ№жӣҙж–°</div>';
  }

  // е…іжіЁж–№еҗ‘
  document.getElementById('wc').innerHTML=`<div class="wc"><div class="wt1">рҹҗөжҳӯиЎҚж–°иҚҜ(е®һйӘҢзҢҙ) <span class="wk wh">hot</span><span class="wk wn">ж–°ж–№еҗ‘</span></div><div class="wr1">"CXOзҡ„еҚ–ж°ҙдәә"вҖ”вҖ”ж–°иҚҜе®үе…ЁиҜ„д»·еҝ…йЎ»з”ЁзҢҙеӯҗгҖӮдёӯеӣҪжңҖеӨ§зҢҙзҫӨ(3дёҮеҸӘ)+дҫӣз»ҷеҸ—йҷҗ(з№Ғж®–йңҖ5е№ҙ)+CXOжҠ•иһҚиө„еӣһжҡ–гҖӮзү©зҗҶдёҚеҸҜжӣҝд»ЈпјҢйҖ»иҫ‘зұ»дјјж°Ұж°”гҖӮеҸӮиҖғпјҡ603127</div></div><div class="wc"><div class="wt1">рҹ”¬еҚҠеҜјдҪ“и®ҫеӨҮ <span class="wk wh">hot</span></div><div class="wr1">еҸӮиҖғпјҡеҢ—ж–№еҚҺеҲӣ/дёӯеҫ®е…¬еҸё</div></div><div class="wc"><div class="wt1">рҹ’Ҡжі°ж јеҢ»иҚҜ(CXO) <span class="wk wh">hot</span></div><div class="wr1">CXOеҚ–ж°ҙдәәйҖ»иҫ‘пјҢжҠ•иһҚиө„еӣһжҡ–+йҷҚжҒҜеӮ¬еҢ–</div></div><div class="wc"><div class="wt1">рҹ“ҰAIеә”з”Ё <span class="wk wd">и¶ӢеҠҝ</span></div><div class="wr1">еҸӮиҖғпјҡйҮ‘еұұеҠһе…¬/з§‘еӨ§и®ҜйЈһ</div></div><div class="wc"><div class="wt1">вҡЎеӣәжҖҒз”өжұ  <span class="wk wh">hot</span></div><div class="wr1">еҸӮиҖғпјҡе®Ғеҫ·ж—¶д»Ј/еҪ“еҚҮз§‘жҠҖ</div></div>`;

  rl();
  startMF();
}

function rl(){
  const d=LBD.data,ds=Object.keys(d).sort(),w=document.getElementById('lw');
  if(!ds.length){w.innerHTML='<div class="ld1">жҡӮж— иҝһжқҝж•°жҚ®</div>';document.getElementById('ls').innerHTML='<span style="color:#64748b">жңҖиҝ‘60ж—Ҙж— 2иҝһжқҝ</span>';return}
  const sm={};
  ds.forEach(date=>{const dd=d[date];if(!dd||!dd.stocks)return;dd.stocks.forEach(s=>{if(!sm[s.code])sm[s.code]={name:s.name,sector:s.sector,days:{}};sm[s.code].days[date]=s.streak})});
  const codes=Object.keys(sm),sd=ds.slice(-60);
  codes.sort((a,b)=>{const la=sm[a],lb=sm[b];const lda=sd.filter(x=>la.days[x]).pop(),ldb=sd.filter(x=>lb.days[x]).pop();return(ldb?lb.days[ldb]:0)-(lda?la.days[lda]:0)||la.name.localeCompare(lb.name)});
  let th='<tr><th style="color:#64748b;text-align:left;padding:4px 6px;font-weight:400;background:#0f172a">иӮЎзҘЁ</th>';
  sd.forEach(d=>{th+=`<th style="color:#334155;text-align:center;padding:4px 2px;font-weight:400;font-size:9px">${d.slice(5)}</th>`});
  th+='</tr>';
  let tb='';
  codes.forEach(code=>{
    const s=sm[code];
    const st=s.sector==='з§‘еҲӣжқҝ'?'<span style="color:#38bdf8;font-size:9px">з§‘еҲӣ</span>':s.sector==='еҲӣдёҡжқҝ'?'<span style="color:#34d399;font-size:9px">еҲӣдёҡ</span>':'';
    tb+=`<tr><td style="padding:4px 6px;white-space:nowrap;background:#0f172a"><span style="font-weight:600">${s.name}</span>${st}</td>`;
    sd.forEach((date,i)=>{
      const sk=s.days[date];
      if(sk){
        let bg='#f97316',fg='#fff';if(sk>=7)bg='#dc2626';else if(sk>=5)bg='#ef4444';else if(sk>=3){bg='#eab308';fg='#0f172a'}else bg='#475569';
        const ps=i>0?sd[i-1]:null,np=ps?s.days[ps]:0;const ns=i<sd.length-1?sd[i+1]:null,nx=ns?s.days[ns]:0;
        tb+=`<td style="text-align:center;padding:2px"><div style="display:inline-flex;align-items:center;gap:0">${np&&sk?'<span style="color:#475569;font-size:8px">в”Җ</span>':''}<span style="display:inline-block;background:${bg};color:${fg};border-radius:3px;padding:1px 5px;font-size:10px;font-weight:700">${sk}</span>${nx&&sk?'<span style="color:#475569;font-size:8px">в”Җ</span>':''}</div></td>`;
      }else tb+='<td style="text-align:center;padding:2px"><span style="color:#1e293b">В·</span></td>';
    });
    tb+='</tr>';
  });
  w.innerHTML='<table style="width:100%;border-collapse:collapse;font-size:11px;min-width:400px"><thead>'+th+'</thead><tbody>'+tb+'</tbody></table>';
  const mx=Math.max(...codes.map(c=>Math.max(...Object.values(sm[c].days))),0);
  document.getElementById('ls').innerHTML='<span style="color:#ef4444">рҹ“Ҡ'+codes.length+'еҸӘ</span> <span style="color:#f97316">рҹ“ҲжңҖй«ҳ'+mx+'жқҝ</span> <span style="color:#64748b">рҹ•җ'+LBD.update_time+'</span>';
}

// ===== жқҝеқ—иө„йҮ‘жөҒеҗ‘: еҲҶж—¶жҠҳзәҝеӣҫ =====
let mfHistory=[]; // [{t:'09:30', in:3.5, out:-1.2, net:2.3}]
const MF_MAX_POINTS=60; // keep last 60 points (30min of 30s data)

function renderMF(){
  const c=document.getElementById('mfChart');
  if(!c)return;
  const ctx=c.getContext('2d'),W=c.width,H=c.height;
  drawMFPlaceholder(ctx,W,H);
  document.getElementById('mfInfo').innerHTML='<span style="color:#38bdf8">рҹ”„ еҠ иҪҪиө„йҮ‘ж•°жҚ®...</span>';
  
  const old=document.getElementById('mfJsonp');
  if(old)old.remove();
  const s=document.createElement('script');
  s.id='mfJsonp';
  s.src='https://push2.eastmoney.com/api/qt/clist/get?cb=mfCB&pn=1&pz=20&po=1&np=1&fields=f12,f14,f3,f62,f184,f66,f69&fid=f62&fs=m:90+t:2+f:!50&ut=b2884a393a59ad64002292a3ca90d2cb&_='+Date.now();
  document.body.appendChild(s);
  setTimeout(()=>{
    if(!window._mfData){
      const oldS=document.getElementById('mfJsonp');
      if(oldS)oldS.remove();
      drawMFPlaceholder(ctx,W,H,'вҸі и¶…ж—¶');
    }
  },8000);
}

function mfCB(d){
  window._mfData=d;
  const c=document.getElementById('mfChart');
  if(!c)return;
  const ctx=c.getContext('2d'),W=c.width,H=c.height;
  const data=d&&d.data&&d.data.diff;
  if(!data||!data.length){
    if(mfHistory.length)return drawMFLines(ctx,W,H);
    return drawMFPlaceholder(ctx,W,H);
  }
  
  // Calculate totals
  let totalIn=0,totalOut=0;
  data.forEach(x=>{const v=(x.f62||0)/100000000;if(v>0)totalIn+=v;else totalOut+=v});
  
  // Add to history
  const now=new Date();
  const timeStr=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  mfHistory.push({t:timeStr,in:totalIn,out:totalOut,net:totalIn+totalOut});
  if(mfHistory.length>MF_MAX_POINTS)mfHistory.shift();
  
  // Cache
  try{localStorage.setItem('mfHist',JSON.stringify(mfHistory.slice(-30)));}catch(e){}
  
  drawMFLines(ctx,W,H);
  window._mfData=null;
}

function drawMFLines(ctx,W,H){
  const hist=mfHistory;
  if(!hist.length)return drawMFPlaceholder(ctx,W,H,'жҡӮж— ж•°жҚ®');
  
  const pad={l:55,r:25,t:38,b:35};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  
  // Find y range: max(|in|, |out|)
  let maxVal=0;
  hist.forEach(h=>{const a=Math.abs(h.in),b=Math.abs(h.out);if(a>maxVal)maxVal=a;if(b>maxVal)maxVal=b});
  maxVal=Math.ceil(maxVal*1.25)||1;
  const yMax=maxVal;
  
  ctx.clearRect(0,0,W,H);
  
  // === Title bar ===
  ctx.fillStyle='#1e293b';ctx.fillRect(0,0,W,28);
  ctx.fillStyle='#94a3b8';ctx.font='11px sans-serif';ctx.textAlign='left';
  ctx.fillText('рҹ“Ҳ жқҝеқ—иө„йҮ‘жөҒеҗ‘ В· йӣ¶иҪҙеҲҶз•Ң',12,19);
  ctx.fillStyle='#475569';ctx.font='9px sans-serif';ctx.textAlign='right';
  ctx.fillText('йҮҮйӣҶзӮ№: '+hist.length+'  В·  жҜҸ30sжӣҙж–°',W-12,18);
  
  // === Background: split by zero line ===
  // Upper half (inflow area) - subtle red tint
  ctx.fillStyle='rgba(239,68,68,0.03)';
  ctx.fillRect(pad.l,pad.t,cw,ch/2);
  // Lower half (outflow area) - subtle green tint  
  ctx.fillStyle='rgba(52,211,153,0.03)';
  ctx.fillRect(pad.l,pad.t+ch/2,cw,ch/2);
  
  // === Y-axis grid ===
  ctx.strokeStyle='#1e293b';ctx.lineWidth=0.5;
  for(let i=-4;i<=4;i++){
    if(i===0)continue;
    const y=pad.t+ch/2-(i/4)*(ch/2);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cw,y);ctx.stroke();
    // Y labels
    ctx.fillStyle='#475569';ctx.font='9px sans-serif';ctx.textAlign='right';
    ctx.fillText((yMax*i/4).toFixed(1)+'дәҝ',pad.l-6,y+3);
  }
  
  // === Zero line (thick, centered) ===
  ctx.strokeStyle='#334155';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(pad.l,pad.t+ch/2);ctx.lineTo(pad.l+cw,pad.t+ch/2);ctx.stroke();
  // "0" label
  ctx.fillStyle='#475569';ctx.font='9px sans-serif';ctx.textAlign='right';
  ctx.fillText('0',pad.l-6,pad.t+ch/2+3);
  
  // Axis labels
  ctx.fillStyle='#ef4444';ctx.font='9px sans-serif';ctx.textAlign='left';
  ctx.fillText('вҶ‘ жөҒе…Ҙ',pad.l+cw+2,pad.t+ch/4+3);
  ctx.fillStyle='#34d399';ctx.font='9px sans-serif';
  ctx.fillText('вҶ“ жөҒеҮә',pad.l+cw+2,pad.t+ch*3/4+3);
  
  // === Draw lines ===
  function toX(i){return pad.l+(i/(hist.length-1||1))*cw}
  function toY(v){return pad.t+ch/2-(v/yMax)*(ch/2)}
  
  function drawLine(data,color,label,side){
    if(data.length<2)return;
    ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineJoin='round';
    ctx.beginPath();
    data.forEach((v,i)=>{
      const x=toX(i),y=toY(Math.abs(v));
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    });
    ctx.stroke();
    
    // Area fill (only up to zero line)
    ctx.fillStyle=color+'18';
    ctx.beginPath();
    ctx.moveTo(toX(0),pad.t+ch/2);
    data.forEach((v,i)=>{ctx.lineTo(toX(i),toY(Math.abs(v)))});
    ctx.lineTo(toX(data.length-1),pad.t+ch/2);
    ctx.closePath();ctx.fill();
    
    // Latest point dot
    const lastIdx=data.length-1;
    const lx=toX(lastIdx),ly=toY(Math.abs(data[lastIdx]));
    ctx.fillStyle=color;
    ctx.beginPath();ctx.arc(lx,ly,4,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#0f172a';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(lx,ly,4,0,Math.PI*2);ctx.stroke();
    
    // Label
    const lastV=data[lastIdx];
    ctx.fillStyle=color;ctx.font='bold 9px sans-serif';
    ctx.textAlign='left';ctx.textBaseline='bottom';
    ctx.fillText(label+Math.abs(lastV).toFixed(2)+'дәҝ',lx+6,ly-2);
  }
  
  // Inflow (goes UP from zero - positive values)
  const inData=hist.map(h=>h.in);
  drawLine(inData,'#ef4444','жөҒе…Ҙ+','up');
  
  // Outflow (goes DOWN from zero - negative values stored as positive for drawing)
  const outData=hist.map(h=>h.out);
  drawLine(outData,'#34d399','жөҒеҮә-','down');
  
  // Net flow line (goes either direction)
  if(hist.length>=2){
    const netData=hist.map(h=>h.net);
    ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;ctx.lineJoin='round';
    ctx.beginPath();
    netData.forEach((v,i)=>{
      const x=toX(i),y=pad.t+ch/2-(v/yMax)*(ch/2);
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    });
    ctx.stroke();
    
    // Dot at latest net
    const li=netData.length-1;
    const lx=toX(li),ly=pad.t+ch/2-(netData[li]/yMax)*(ch/2);
    ctx.fillStyle='#fbbf24';
    ctx.beginPath();ctx.arc(lx,ly,4,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#0f172a';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(lx,ly,4,0,Math.PI*2);ctx.stroke();
    
    ctx.fillStyle='#fbbf24';ctx.font='bold 9px sans-serif';ctx.textAlign='left';ctx.textBaseline='bottom';
    ctx.fillText('еҮҖйўқ'+(netData[li]>0?'+':'')+netData[li].toFixed(2)+'дәҝ',lx+6,ly-2);
  }
  
  // === X-axis labels ===
  ctx.fillStyle='#475569';ctx.font='9px sans-serif';ctx.textAlign='center';
  const labelInterval=Math.max(1,Math.floor(hist.length/8));
  for(let i=0;i<hist.length;i+=labelInterval){
    ctx.fillText(hist[i].t,toX(i),pad.t+ch+16);
  }
  if(hist.length>1&&(hist.length-1)%labelInterval!==0){
    ctx.fillText(hist[hist.length-1].t,toX(hist.length-1),pad.t+ch+16);
  }
  
  // === Legend ===
  const lgY=pad.t-20;
  [['#ef4444','жөҒе…Ҙ',12],['#34d399','жөҒеҮә',72],['#fbbf24','еҮҖйўқ',132]].forEach(([c,l,x])=>{
    ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,lgY+4,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#e2e8f0';ctx.font='9px sans-serif';ctx.textAlign='left';
    ctx.fillText(l,x+8,lgY+8);
  });
  
  const last=hist[hist.length-1];
  document.getElementById('mfInfo').innerHTML='<span style="display:flex;gap:16px;flex-wrap:wrap;font-size:11px;align-items:center">'
    +'<span><span style="color:#ef4444">рҹ”ҙ</span> жөҒе…Ҙ <span style="color:#64748b">'+last.in.toFixed(2)+'дәҝ</span></span>'
    +'<span><span style="color:#34d399">рҹҹў</span> жөҒеҮә <span style="color:#64748b">'+last.out.toFixed(2)+'дәҝ</span></span>'
    +'<span><span style="color:#fbbf24">рҹҹЎ</span> еҮҖйўқ <span style="color:#64748b">'+(last.net>0?'+':'')+last.net.toFixed(2)+'дәҝ</span></span>'
    +'<span style="color:#64748b">| йӣ¶иҪҙд»ҘдёҠ=жөҒе…Ҙ д»ҘдёӢ=жөҒеҮә В· жҜҸ30з§’йҮҮйӣҶ</span></span>';
}

function drawMFPlaceholder(ctx,W,H,msg){
  msg=msg||'вҸі зӯүеҫ…ж•°жҚ®...';
  const pad={l:55,r:25,t:38,b:35};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#1e293b';ctx.fillRect(0,0,W,28);
  ctx.fillStyle='#475569';ctx.font='11px sans-serif';ctx.textAlign='left';
  ctx.fillText('рҹ“Ҳ жқҝеқ—иө„йҮ‘жөҒеҗ‘ В· йӣ¶иҪҙеҲҶз•Ң',12,19);
  
  // Background tint
  ctx.fillStyle='rgba(239,68,68,0.03)';ctx.fillRect(pad.l,pad.t,cw,ch/2);
  ctx.fillStyle='rgba(52,211,153,0.03)';ctx.fillRect(pad.l,pad.t+ch/2,cw,ch/2);
  
  // Grid
  ctx.strokeStyle='#1e293b';ctx.lineWidth=0.5;
  for(let i=-4;i<=4;i++){
    if(i===0)continue;
    const y=pad.t+ch/2-(i/4)*(ch/2);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cw,y);ctx.stroke();
  }
  ctx.strokeStyle='#1e293b';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(pad.l,pad.t+ch/2);ctx.lineTo(pad.l+cw,pad.t+ch/2);ctx.stroke();
  
  ctx.fillStyle='#475569';ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(msg,W/2,pad.t+ch/2-10);
  ctx.fillStyle='#475569';ctx.font='10px sans-serif';
  ctx.fillText('ејҖзӣҳеҗҺиҮӘеҠЁйҮҮйӣҶеҲҶж—¶ж•°жҚ®',W/2,pad.t+ch/2+12);
  document.getElementById('mfInfo').innerHTML='<span style="color:#475569;font-size:11px">вҸі йқһдәӨжҳ“ж—¶ж®ө</span>';
}

// Override startMF to poll every 30s during market hours
let mfTimer;
function startMF(){
  if(mfTimer)clearInterval(mfTimer);
  // Load cached history
  try{
    const c=localStorage.getItem('mfHist');
    if(c){const p=JSON.parse(c);if(p&&p.length)mfHistory=p}
  }catch(e){}
  renderMF();
  mfTimer=setInterval(()=>{
    const st=ms();
    if(st.open||st.usOpen)renderMF();
  },30000);
}

function rf(){
  const s=ms();document.getElementById('st').textContent='еҲ·ж–°...';
  document.getElementById('sg').innerHTML='<div class="ld1"><span class="sp"></span>иҺ·еҸ–ж•°жҚ®...</div>';
  fx().then(d=>{rd(d);cd(s.any?30:nh())});
}

function nh(){const n=new Date();return Math.max(60,Math.floor((new Date(n.getFullYear(),n.getMonth(),n.getDate(),n.getHours()+1,0,0,0)-n)/1000))}
function cd(s){if(window._t)clearInterval(window._t);let r=s;
  window._t=setInterval(()=>{r--;const st=ms();document.getElementById('cd').textContent=st.open?r+'s':st.jpOpen||st.krOpen?r+'sрҹҢҸ':st.usOpen?r+'sрҹҢҷ':new Date(Date.now()+r*1000).getHours().toString().padStart(2,'0')+':00('+Math.floor(r/60)+'еҲҶ)';if(r<=0){clearInterval(window._t);rf()}},1000)}

rf();
</script>
