<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 持仓实时Dashboard · 智能版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#0f172a;color:#e2e8f0;padding:16px;min-height:100vh}
h1{font-size:22px;display:flex;align-items:center;gap:8px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.stats{font-size:12px;color:#94a3b8;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.stats .dot{width:8px;height:8px;border-radius:50%;display:inline-block;background:#ef4444;animation:pulse 2s infinite}
.stats .dot.off{background:#f87171;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px;margin-bottom:16px}
.card{background:#1e293b;border-radius:10px;padding:14px;border:1px solid #334155}
.card-header{font-size:13px;color:#38bdf8;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.card-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.price-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.price-val{font-size:24px;font-weight:700}
.chg{padding:2px 8px;border-radius:4px;font-size:14px;font-weight:600}
.chg-up{background:#450a0a;color:#ef4444}
.chg-down{background:#064e3b;color:#34d399}
.chg-flat{background:#1e293b;color:#94a3b8}
.chain{font-size:11px;color:#64748b;padding:6px 8px;background:#0f172a;border-radius:6px;margin-top:6px;line-height:1.5}
.msg{background:#0f172a;border-radius:6px;padding:6px 8px;margin-top:6px;font-size:11px;line-height:1.5;border-left:2px solid #38bdf8}
.msg-warn{border-left-color:#34d399}
.msg-ok{border-left-color:#ef4444}
.signal{text-align:right;font-size:11px;margin-top:4px;padding:2px 8px;border-radius:4px;display:inline-block;float:right}
.sig-buy{background:#450a0a;color:#ef4444}
.sig-hold{background:#1e293b;color:#fbbf24}
.sig-watch{background:#450a0a;color:#ef4444}
.sig-sell{background:#064e3b;color:#34d399}
.idx-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:12px}
.idx-item{background:#0f172a;border-radius:8px;padding:8px;text-align:center}
.idx-item .name{font-size:11px;color:#64748b}
.idx-item .val{font-size:16px;font-weight:700;margin:2px 0}
.idx-item .pct{font-size:12px}
.global-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-top:8px}
.global-item{background:#0f172a;border-radius:8px;padding:6px;text-align:center}
.g-name{font-size:10px;color:#94a3b8;display:block}
.g-val{font-size:13px;font-weight:700;display:block;margin:1px 0}
.news-section{background:#1e293b;border-radius:10px;padding:14px;border:1px solid #334155;margin-bottom:16px}
.section-title{font-size:13px;color:#38bdf8;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.news-item{padding:6px 0;border-bottom:1px solid #0f172a;font-size:12px;display:flex;gap:8px;align-items:flex-start}
.news-item:last-child{border:none}
.news-tag{background:#0f172a;padding:1px 6px;border-radius:3px;font-size:10px;white-space:nowrap}
.news-time{color:#475569;font-size:10px;white-space:nowrap}
.news-text{color:#cbd5e1}
.analysis-item{padding:4px 0;font-size:12px;display:flex;gap:8px;align-items:flex-start}
.analysis-tag{background:#0f172a;padding:1px 6px;border-radius:3px;font-size:10px;white-space:nowrap}
.a-buy{color:#ef4444}
.a-hold{color:#fbbf24}
.a-watch{color:#34d399}
.watch-card{background:linear-gradient(135deg,#1e293b,#1a1a3e);border-radius:10px;padding:14px;border:1px solid #334155;margin-bottom:8px}
.watch-title{font-size:14px;color:#fbbf24;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.watch-reason{font-size:11px;color:#94a3b8;line-height:1.6}
.watch-tag{display:inline-block;padding:1px 8px;border-radius:10px;font-size:10px;margin-right:4px;margin-top:4px}
.watch-tag.hot{background:#450a0a;color:#ef4444}
.watch-tag.new{background:#450a0a;color:#ef4444}
.watch-tag.trend{background:#1e1b4b;color:#818cf8}
/* 连板天梯图 */
.ladder-section{background:#1e293b;border-radius:10px;padding:14px;border:1px solid #fbbf24;margin-bottom:16px}
.ladder-title{font-size:14px;color:#fbbf24;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ladder-grid{display:flex;flex-direction:column;gap:4px}
.ladder-row{display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:6px;background:#0f172a}
.ladder-rank{width:28px;text-align:center;font-weight:700;font-size:13px}
.ladder-rank.gold{color:#fbbf24}
.ladder-rank.silver{color:#94a3b8}
.ladder-rank.bronze{color:#cd7f32}
.ladder-stock{font-size:13px;font-weight:600;color:#e2e8f0;min-width:80px}
.ladder-code{font-size:10px;color:#475569;min-width:70px}
.ladder-bar{flex:1;height:20px;border-radius:4px;position:relative;overflow:hidden}
.ladder-bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:600;color:#fff;min-width:30px}
.ladder-bar.n2 .ladder-bar-fill{background:linear-gradient(90deg,#1e293b,#334155);width:30%}
.ladder-bar.n3 .ladder-bar-fill{background:linear-gradient(90deg,#334155,#475569);width:45%}
.ladder-bar.n4 .ladder-bar-fill{background:linear-gradient(90deg,#475569,#64748b);width:60%}
.ladder-bar.n5 .ladder-bar-fill{background:linear-gradient(90deg,#64748b,#fbbf24);width:75%;color:#0f172a}
.ladder-bar.n6 .ladder-bar-fill{background:linear-gradient(90deg,#fbbf24,#f97316);width:85%;color:#0f172a}
.ladder-bar.n7 .ladder-bar-fill{background:linear-gradient(90deg,#f97316,#ef4444);width:95%;color:#fff}
.ladder-bar.n8 .ladder-bar-fill{background:linear-gradient(90deg,#ef4444,#dc2626);width:100%;color:#fff}
.ladder-chg{font-size:11px;min-width:55px;text-align:right}
.ladder-empty{padding:12px;text-align:center;color:#64748b;font-size:12px}
.ladder-sector{font-size:9px;color:#64748b;padding:1px 4px;border-radius:3px;background:#1e293b}
.ladder-note{font-size:10px;color:#475569;margin-top:8px;text-align:center}
.footer{text-align:center;color:#475569;font-size:11px;padding:12px;border-top:1px solid #1e293b;margin-top:16px}
.loading{text-align:center;padding:40px;color:#64748b;font-size:14px}
.loading .spinner{display:inline-block;width:16px;height:16px;border:2px solid #334155;border-top-color:#38bdf8;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.market-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600}
.market-open{background:#450a0a;color:#ef4444}
.market-closed{background:#1e293b;color:#94a3b8}
</style>
</head>
<body>

<div class="header">
  <h1>📊 持仓智能Dashboard</h1>
  <div class="stats">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">实时</span>
    <span id="marketBadge"></span>
    <span id="timeDisplay">--:--:--</span>
    <span id="countdown">刷新: 30s</span>
    <button onclick="refreshNow()" style="background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px">⟳ 刷新</button>
  </div>
</div>

<!-- 指数 -->
<div class="card" style="margin-bottom:12px">
  <div class="idx-grid" id="idxGrid">
    <div class="idx-item"><div class="name">上证指数</div><div class="val" id="sh">--</div><div class="pct" id="sh_chg">--</div></div>
    <div class="idx-item"><div class="name">深证成指</div><div class="val" id="sz">--</div><div class="pct" id="sz_chg">--</div></div>
    <div class="idx-item"><div class="name">创业板指</div><div class="val" id="cy">--</div><div class="pct" id="cy_chg">--</div></div>
    <div class="idx-item" style="border:1px solid #334155"><div class="name" style="color:#38bdf8">科创50 🚀</div><div class="val" id="kc">--</div><div class="pct" id="kc_chg">--</div></div>
  </div>
  <div class="global-grid" id="globalGrid"></div>
</div>

<!-- 持仓 -->
<div class="grid" id="stockGrid">
  <div class="loading"><div class="spinner"></div>正在获取数据...</div>
</div>

<!-- 新关注方向 -->
<div class="card" style="margin-bottom:16px;border-color:#fbbf24">
  <div class="section-title" style="color:#fbbf24">🔭 新关注方向 · 基于产业链逻辑</div>
  <div id="watchlistContainer"></div>
</div>

<!-- 连板天梯图 -->
<div class="ladder-section">
  <div class="ladder-title">📈 连板天梯图 · 60日连板统计</div>
  <div id="ladderContainer">
    <div class="ladder-empty"><div class="spinner" style="display:inline-block;width:12px;height:12px;border:2px solid #334155;border-top-color:#38bdf8;border-radius:50%;animation:spin .8s linear infinite;margin-right:6px;vertical-align:middle"></div>正在扫描连板数据...</div>
  </div>
  <div class="ladder-note">数据来源: 腾讯财经K线 | 涨停标准: ≥+9.90% | 更新: 2026-07-10 17:15 | GH Actions 每小时扫描</div>
</div>

<!-- 新闻+分析 -->
<div class="news-section">
  <div class="section-title">📰 相关新闻</div>
  <div id="newsContainer"></div>
</div>
<div class="analysis-section">
  <div class="section-title">🧠 底层逻辑判断</div>
  <div id="analysisContainer"></div>
</div>

<div class="footer">
  📊 盘中每30秒更新价格 | 盘后每小时更新逻辑 | 数据来源: 腾讯财经API
</div>

<script>
// ========== 配置 ==========
const HOLDINGS = [
  {id:'hk00981',name:'中芯国际',desc:'AI芯片制造龙头(H股)',chain:'半导体制造→AI芯片→HBM/GPU',logic:'中国最先进制程，AI芯片刚需',risk:'地缘政治限制设备进口',isHk:true},
  {id:'sz000021',name:'深科技',desc:'存储封测铲子',chain:'存储封测→长鑫/长存→AI服务器',logic:'HBM挤压通用DRAM→封测需求增，14.7亿扩产',risk:'HBM仍在研发'},
  {id:'sh603650',name:'彤程新材',desc:'光刻胶国产替代',chain:'光刻胶→晶圆制造→芯片',logic:'ArF/KrF光刻胶国产龙头，中芯绑定深',risk:'高端光刻胶仍在验证'},
  {id:'sh688106',name:'金宏气体',desc:'特气/氦气龙头',chain:'氦气/特气→半导体制造',logic:'氦气物理不可替代，90%进口，国产替代',risk:'PE 219偏高'},
  {id:'sh688114',name:'华大智造',desc:'基因测序国产龙头',chain:'测序仪→医院/药企→精准医疗',logic:'国产测序唯一标的，全球第三',risk:'集采政策风险'},
  {id:'sh688507',name:'索辰科技',desc:'CAE仿真软件',chain:'CAE软件→军工/车企→研发',logic:'国产CAE龙头，军工市占率第一',risk:'客户拓展慢'},
  {id:'sz002594',name:'比亚迪',desc:'新能源车龙头',chain:'新能源车→电池→出海',logic:'销量全球第一，出海加速',risk:'价格战激烈'},
  {id:'sz000762',name:'西藏矿业',desc:'锂矿',chain:'锂矿→碳酸锂→电池',logic:'罗洄说还没到底，等信号',risk:'锂价低迷'},
  {id:'sz300174',name:'元力股份',desc:'超级电容/活性炭',chain:'超级电容→储能→新能源',logic:'从底部企稳中',risk:'市场规模有限'}
];

const INDICES = ['sh000001','sz399001','sz399006','sh000688'];
const IDX_KEYS = {sh000001:'sh',sz399001:'sz',sz399006:'cy',sh000688:'kc'};

// ========== 市场状态检测 ==========
function getMarketState() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  const bjt = h * 60 + m;
  // A股/港股交易时段: 09:30-15:00
  const isOpen = bjt >= 570 && bjt <= 900; // 570=09:30, 900=15:00
  // 美股盘前: 19:00-21:30
  const isPreUS = bjt >= 1140 && bjt <= 1290; // 19:00-21:30
  // 日韩: 08:00-14:30
  const isJPKR = bjt >= 480 && bjt <= 870; // 08:00-14:30
  return { isOpen, isPreUS, isJPKR, hour: h, minute: m };
}

function getRefreshInterval(state) {
  if (state.isOpen) return 30;
  // 盘后: 到下一个整点的秒数
  const now = new Date();
  const nextHour = new Date(now);
  nextHour.setHours(now.getHours() + 1, 0, 0, 0);
  const secs = Math.floor((nextHour - now) / 1000);
  return Math.max(secs, 60);
}

// ========== 数据获取 ==========
async function fetchAll() {
  const codes = INDICES.concat(HOLDINGS.map(h => h.id)).join(',');
  const url = `https://qt.gtimg.cn/q=${codes}&_=${Date.now()}`;
  try {
    const resp = await fetch(url, {cache:'no-store'});
    const text = await resp.text();
    const lines = text.split(';');
    const data = {};
    for (const line of lines) {
      if (!line.includes('~')) continue;
      const eq = line.indexOf('=');
      if (eq < 0) continue;
      const code = line.substring(0, eq).replace('var ','').trim();
      const content = line.substring(eq+2, line.lastIndexOf('"'));
      if (!content) continue;
      data[code] = content.split('~');
    }
    return data;
  } catch(e) {
    console.error('Fetch error:', e);
    return null;
  }
}

// ========== 渲染 ==========
function render(data) {
  const state = getMarketState();
  
  // 更新状态
  document.getElementById('timeDisplay').textContent = new Date().toLocaleTimeString('zh-CN');
  
  const badge = document.getElementById('marketBadge');
  if (state.isOpen) {
    badge.innerHTML = '<span class="market-badge market-open">🟢 交易中</span>';
  } else {
    badge.innerHTML = '<span class="market-badge market-closed">🔴 已收盘</span>';
  }
  
  if (!data) {
    document.getElementById('stockGrid').innerHTML = '<div class="card" style="text-align:center;padding:30px;color:#f87171">⚠️ 获取数据失败，请检查网络后重试</div>';
    return;
  }
  
  // 指数
  for (const idx of INDICES) {
    const key = 'v_' + idx;
    const parts = data[key];
    const elId = IDX_KEYS[idx];
    if (parts && parts.length > 4) {
      const p = parseFloat(parts[3]) || 0;
      const c = parseFloat(parts[4]) || p;
      const chg = c ? ((p-c)/c*100) : 0;
      const color = chg > 0 ? '#ef4444' : chg < 0 ? '#34d399' : '#94a3b8';
      document.getElementById(elId).textContent = p.toFixed(2);
      document.getElementById(elId).style.color = color;
      const chgEl = document.getElementById(elId + '_chg');
      chgEl.textContent = (chg > 0 ? '+' : '') + chg.toFixed(2) + '%';
      chgEl.style.color = color;
    }
  }
  
  // 持仓
  let html = '';
  for (const h of HOLDINGS) {
    const key = 'v_' + h.id;
    const parts = data[key];
    let price = 0, chg = 0, priceStr = '--', chgStr = '--', cls = 'chg-flat';
    
    if (parts && parts.length > 4) {
      const p = parseFloat(parts[3]) || 0;
      const c = parseFloat(parts[4]) || p;
      chg = c ? ((p-c)/c*100) : 0;
      price = p;
      priceStr = p.toFixed(2);
      if (h.isHk) priceStr += ' <span style="font-size:11px;color:#94a3b8;font-weight:400">HKD</span>';
      chgStr = (chg > 0 ? '+' : '') + chg.toFixed(2) + '%';
      cls = chg > 0.5 ? 'chg-up' : chg < -0.5 ? 'chg-down' : 'chg-flat';
    }
    
    let sig = 'hold', sigText = '持有';
    if (chg > 5) { sig = 'buy'; sigText = '🔥强势'; }
    else if (chg > 2) { sig = 'buy'; sigText = '📈上涨'; }
    else if (chg < -3) { sig = 'watch'; sigText = '⚠️关注'; }
    else if (chg < -5) { sig = 'sell'; sigText = '💀警惕'; }
    if (price === 0) { sig = 'hold'; sigText = '⏳等待'; }
    
    const dotColor = chg > 0 ? '#ef4444' : chg < 0 ? '#34d399' : '#64748b';
    const logicText = price === 0 ? '数据加载中...' : (chg > 0 ? '✅ ' + h.logic : '💧 ' + h.logic);
    
    html += `<div class="card">
      <div class="card-header"><span class="card-dot" style="background:${dotColor}"></span>${h.desc}</div>
      <div class="price-row">
        <span class="price-val">${priceStr}</span>
        <span class="chg ${cls}">${chgStr}</span>
      </div>
      <div class="chain">🔗 ${h.chain}</div>
      <div class="msg ${chg > 0 ? 'msg-ok' : 'msg-warn'}">${logicText}</div>
      <div class="msg msg-warn">⚠️ ${h.risk}</div>
      <div class="signal sig-${sig}">${sigText}</div>
    </div>`;
  }
  document.getElementById('stockGrid').innerHTML = html;
  
  renderNews();
  renderAnalysis();
  renderWatchlist(state);
  renderLadder();
}

// ========== 新闻 ==========
function renderNews() {
  const state = getMarketState();
  const news = [
    {t: state.isOpen ? '盘中' : '收盘', tag:'大盘', text: state.isOpen ? '实时更新中' : '等待盘后数据', c:'info'},
    {t:'今',tag:'深科技',text:'两天从51→61，+19.7%验证封测逻辑',c:'ok'},
    {t:'今',tag:'华大',text:'基因测序赛道回暖，关注可持续性',c:'ok'},
    {t:'今',tag:'金宏',text:'36支撑位反复测试，氦气逻辑未破',c:'warn'},
    {t:'昨夜',tag:'美股',text:'纳指+1.30%，纳指100+1.62%，科技强势',c:'ok'},
    {t:'7/9',tag:'科创50',text:'昨日+8.41%创纪录！中芯+13.74%',c:'ok'},
    {t:'7/9',tag:'罗洄头',text:'沉默第3天，判断全部应验',c:'info'}
  ];
  const tc = {ok:'#ef4444',warn:'#34d399',info:'#38bdf8'};
  document.getElementById('newsContainer').innerHTML = news.map(n =>
    `<div class="news-item"><span class="news-time">${n.t}</span><span class="news-tag" style="color:${tc[n.c]}">${n.tag}</span><span class="news-text">${n.text}</span></div>`
  ).join('');
}

// ========== 分析 ==========
function renderAnalysis() {
  const analysis = [
    {tag:'🧠',text:'科创50今日回调正常，7连涨后休息，下周有望再攻',tp:'hold'},
    {tag:'🔥',text:'深科技验证"存储封测铲子"逻辑，HBM挤压通用DRAM→封测需求增，中线看好',tp:'buy'},
    {tag:'💡',text:'华大加速，基因测序是AI在医疗最直接的应用场景，关注下周能否放量',tp:'buy'},
    {tag:'⚠️',text:'金宏跌至36左右，但氦气逻辑未破(物理不可替代)，36是重要支撑，破35.5需警惕',tp:'watch'},
    {tag:'📊',text:'中芯(H股)85.6 HKD，大涨后整理，A股折价50%是长期现象，逻辑不变',tp:'hold'},
    {tag:'🌍',text:'纳指+1.30%+日经+1.77%→全球科技共振仍在，下周A股科技有望延续',tp:'hold'}
  ];
  const tpMap = {buy:'a-buy',hold:'a-hold',watch:'a-watch'};
  document.getElementById('analysisContainer').innerHTML = analysis.map(a =>
    `<div class="analysis-item"><span class="analysis-tag ${tpMap[a.tp]}">${a.tag}</span><span class="news-text">${a.text}</span></div>`
  ).join('');
}

// ========== 新关注方向 ==========
function renderWatchlist(state) {
  // 基于产业链逻辑 + 当前市场热点生成的关注方向
  const watchlist = [
    {
      title: '🔬 半导体设备 — 国产替代下一站',
      tags: ['hot','新方向'],
      reason: '逻辑：半导体产业链我们从封测(深科技)和特气(金宏)已经布局，但设备环节(刻蚀/薄膜/检测)是国产替代的最薄弱环节，政策支持力度最大。'

  ]
};

// ========== 渲染连板天梯图 ==========
function renderLadder() {
  const data = LIANBAN_DATA.stocks;
  const container = document.getElementById('ladderContainer');
  
  if (!data || data.length === 0) {
    container.innerHTML = '<div class="ladder-empty">暂无连板股票（今日无+9.9%以上连板）</div>';
    return;
  }
  
  // 分组：按连板数
  const groups = {};
  for (const s of data) {
    const key = s.streak;
    if (!groups[key]) groups[key] = [];
    groups[key].push(s);
  }
  
  const levels = Object.keys(groups).map(Number).sort((a,b) => b-a);
  let html = '';
  
  for (const level of levels) {
    const stocks = groups[level];
    const rankLabel = level >= 5 ? `<span style="color:#ef4444;font-weight:700">${level}连板</span>` : 
                      level >= 3 ? `<span style="color:#fbbf24;font-weight:700">${level}连板</span>` :
                      `<span style="color:#94a3b8">${level}连板</span>`;
    
    for (const s of stocks) {
      const barClass = `n${Math.min(level, 8)}`;
      const chgColor = s.chg > 0 ? '#ef4444' : '#34d399';
      const chgSign = s.chg > 0 ? '+' : '';
      const sectorTag = s.sector === '科创板' ? '<span class="ladder-sector" style="color:#38bdf8">科创</span>' :
                        s.sector === '创业板' ? '<span class="ladder-sector" style="color:#34d399">创业</span>' : '';
      
      html += `<div class="ladder-row">
        <div class="ladder-rank">${level}×</div>
        <div class="ladder-stock">${s.name}</div>
        <div class="ladder-code">${s.code.replace('sh','').replace('sz','')} ${sectorTag}</div>
        <div class="ladder-bar ${barClass}"><div class="ladder-bar-fill">${rankLabel}</div></div>
        <div class="ladder-chg" style="color:${chgColor}">${chgSign}${s.chg.toFixed(2)}%</div>
      </div>`;
    }
  }
  
  // 如果只有1连板，加说明
  const maxLevel = Math.max(...levels);
  if (maxLevel <= 1) {
    html += '<div class="ladder-empty" style="margin-top:8px;padding:8px">⚠️ 今日无2连板以上股票，市场连板效应弱，短线情绪偏谨慎</div>';
  }
  
  container.innerHTML = html;
}
let timer, refreshInterval = 30;

function refreshNow() {
  const state = getMarketState();
  refreshInterval = getRefreshInterval(state);
  
  document.getElementById('statusText').innerHTML = '刷新中...';
  document.getElementById('stockGrid').innerHTML = '<div class="loading"><div class="spinner"></div>正在获取数据...</div>';
  
  // 更新市场状态dot
  const dot = document.getElementById('statusDot');
  dot.className = 'dot' + (state.isOpen ? '' : ' off');
  
  fetchAll().then(data => {
    render(data);
    document.getElementById('statusText').innerHTML = state.isOpen ? '实时' : '盘后模式';
    startCountdown(refreshInterval);
  });
}

function startCountdown(sec) {
  if (timer) clearInterval(timer);
  let remaining = sec;
  const el = document.getElementById('countdown');
  timer = setInterval(() => {
    remaining--;
    const st = getMarketState();
    if (st.isOpen) {
      el.textContent = `刷新: ${remaining}s`;
    } else {
      const min = Math.floor(remaining / 60);
      const secs = remaining % 60;
      const nextH = new Date();
      nextH.setSeconds(nextH.getSeconds() + remaining);
      el.textContent = `${nextH.getHours().toString().padStart(2,'0')}:00 整点更新 (${min}分${secs}秒)`;
    }
    if (remaining <= 0) {
      clearInterval(timer);
      refreshNow();
    }
  }, 1000);
}

// ========== 启动 ==========
refreshNow();
