<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 持仓智能Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#0f172a;color:#e2e8f0;padding:16px}
h1{font-size:20px;display:flex;align-items:center;gap:6px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.status{font-size:12px;color:#94a3b8;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;background:#ef4444;animation:pulse 2s infinite}
.dot.off{background:#64748b;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600}
.bgo{background:#450a0a;color:#ef4444}
.bgc{background:#1e293b;color:#94a3b8}
.btn{background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.btn:hover{background:#334155;color:#e2e8f0}
.card{background:#1e293b;border-radius:10px;padding:14px;border:1px solid #334155;margin-bottom:12px}
.ct{font-size:13px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ixg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:8px}
.ixi{background:#0f172a;border-radius:8px;padding:8px;text-align:center}
.ixi .n{font-size:11px;color:#64748b}
.ixi .v{font-size:15px;font-weight:700;margin:2px 0}
.ixi .p{font-size:11px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;margin-bottom:12px}
.sc{background:#1e293b;border-radius:10px;padding:12px;border:1px solid #334155}
.sc .l{font-size:11px;color:#38bdf8;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.sc .pr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sc .pr .n{font-size:22px;font-weight:700}
.sc .pr .c{padding:2px 8px;border-radius:4px;font-size:13px;font-weight:600}
.up{background:#450a0a;color:#ef4444}
.dn{background:#064e3b;color:#34d399}
.fl{background:#1e293b;color:#94a3b8}
.sc .i{font-size:11px;color:#64748b;padding:4px 6px;background:#0f172a;border-radius:4px;margin-top:4px;line-height:1.4}
.sc .t{font-size:10px;padding:2px 8px;border-radius:4px;display:inline-block;float:right;margin-top:4px}
.tb{background:#450a0a;color:#ef4444}
.th{background:#1e293b;color:#fbbf24}
.tw{background:#064e3b;color:#34d399}
.ni{padding:5px 0;border-bottom:1px solid #0f172a;font-size:12px;display:flex;gap:8px;align-items:flex-start}
.ni:last-child{border:none}
.nt{padding:1px 6px;border-radius:3px;font-size:10px;white-space:nowrap;background:#0f172a}
.nx{color:#475569;font-size:10px;white-space:nowrap}
.ntx{color:#cbd5e1}
.ai{padding:4px 0;font-size:12px;display:flex;gap:8px;align-items:flex-start}
.at{padding:1px 6px;border-radius:3px;font-size:10px;white-space:nowrap;background:#0f172a}
.ab{color:#ef4444}
.ah{color:#fbbf24}
.aw{color:#34d399}
.wc{background:linear-gradient(135deg,#1e293b,#1a1a3e);border-radius:8px;padding:12px;border:1px solid #334155;margin-bottom:8px}
.wc .wt{font-size:13px;color:#fbbf24;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.wc .wr{font-size:11px;color:#94a3b8;line-height:1.5}
.wk{display:inline-block;padding:1px 8px;border-radius:10px;font-size:10px;margin-right:4px}
.wh{background:#450a0a;color:#ef4444}
.wn{background:#450a0a;color:#ef4444}
.wd{background:#1e1b4b;color:#818cf8}
.lb{background:#0f172a;border-radius:8px;padding:8px;margin-bottom:8px;overflow-x:auto}
.ln{font-size:10px;color:#475569;text-align:center;margin-top:6px}
.ld{text-align:center;padding:30px;color:#64748b;font-size:14px}
.sp{display:inline-block;width:14px;height:14px;border:2px solid #334155;border-top-color:#38bdf8;border-radius:50%;animation:s .8s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes s{to{transform:rotate(360deg)}}
.ft{text-align:center;color:#475569;font-size:11px;padding:12px;border-top:1px solid #1e293b;margin-top:16px}
</style>
</head>
<body>

<div class="header">
  <h1>📊 持仓智能Dashboard</h1>
  <div class="status">
    <span class="dot" id="sd"></span>
    <span id="st">加载中</span>
    <span id="mb"></span>
    <span id="tm">--:--</span>
    <span id="cd" style="color:#475569">--</span>
    <button class="btn" onclick="rf()">⟳ 刷新</button>
  </div>
</div>

<div class="card"><div class="ixg" id="ixg"></div></div>
<div class="sg" id="sg"><div class="ld"><span class="sp"></span>加载中...</div></div>

<div class="card" style="border-color:#fbbf24">
  <div class="ct" style="color:#fbbf24">🔭 新关注方向</div>
  <div id="wc"></div>
</div>

<div class="card" style="border-color:#f97316">
  <div class="ct" style="color:#f97316">📈 连板连线图 · 连续2天+涨停追踪 (60个交易日)</div>
  <div class="lb" id="ladderWrap"><div class="ld">扫描中...</div></div>
  <div id="ls" style="display:flex;gap:10px;flex-wrap:wrap;font-size:11px;margin:6px 0"></div>
  <div class="ln">涨停阈值: 主板≥9.90% | 科创/创业板≥19.90% | 北交所≥29.90% | 全市场5000+只股票</div>
</div>

<div class="card"><div class="ct">📰 相关新闻</div><div id="nc"></div></div>
<div class="card"><div class="ct">🧠 底层逻辑判断</div><div id="ac"></div></div>
<div class="ft">盘中30秒·盘后整点更新 | 腾讯财经API | 涨🔴跌🟢</div>

<script>
const H=[
  {c:'hk00981',n:'中芯国际(H)',d:'AI芯片龙头',l:'最先进制程，AI芯片刚需',r:'地缘政治限制',k:1},
  {c:'sz000021',n:'深科技',d:'存储封测铲子',l:'HBM挤压DRAM→封测需求增',r:'HBM仍在研发'},
  {c:'sh603650',n:'彤程新材',d:'光刻胶国产替代',l:'ArF/KrF国产龙头',r:'高端光刻胶验证中'},
  {c:'sh688106',n:'金宏气体',d:'特气/氦气龙头',l:'氦气不可替代+出口禁令',r:'PE 219偏高'},
  {c:'sh688114',n:'华大智造',d:'基因测序龙头',l:'国产唯一，全球第三',r:'集采风险'},
  {c:'sh688507',n:'索辰科技',d:'CAE仿真软件',l:'国产CAE龙头',r:'客户拓展慢'},
  {c:'sz002594',n:'比亚迪',d:'新能源车龙头',l:'销量全球第一',r:'价格战激烈'},
  {c:'sz000762',n:'西藏矿业',d:'锂矿',l:'锂矿周期底部，等待信号',r:'锂价低迷'},
  {c:'sz300174',n:'元力股份',d:'超级电容',l:'从底部企稳',r:'市场规模有限'}
];
const IX={sh000001:'sh',sz399001:'sz',sz399006:'cy',sh000688:'kc'};
const IXN={sh000001:'上证指数',sz399001:'深证成指',sz399006:'创业板指',sh000688:'科创50'};
const LBD={"update_time":"2026-07-10 20:37","days":4,"data":{"2026-04-16":{"stocks":[{"code":"sh605388","name":"均瑶健康","streak":2,"sector":"主板","chg":9.96}],"count":1,"max_streak":2},"2026-05-27":{"stocks":[{"code":"sz002251","name":"步步高","streak":2,"sector":"主板","chg":12.01}],"count":1,"max_streak":2},"2026-06-30":{"stocks":[{"code":"sz000004","name":"国华退","streak":2,"sector":"主板","chg":13.33}],"count":1,"max_streak":2},"2026-07-03":{"stocks":[{"code":"sz000004","name":"国华退","streak":2,"sector":"主板","chg":12.5}],"count":1,"max_streak":2}}};

function mk(){const d=new Date(),h=d.getHours(),m=d.getMinutes(),w=d.getDay();
  // 2026年中国 A股/港股节假日列表
  const holidays=['2026-01-01','2026-02-16','2026-02-17','2026-02-18','2026-02-19','2026-02-20',
    '2026-04-06','2026-05-01','2026-06-22','2026-09-28','2026-10-01','2026-10-02','2026-10-05','2026-10-06','2026-10-07'];
  const today=d.toISOString().slice(0,10);
  const isHoliday=holidays.includes(today);
  return{open:(w>0&&w<6&&!isHoliday)&&(h*60+m)>=570&&(h*60+m)<=900}}

async function fd(){
  const cs=Object.keys(IX).concat(H.map(h=>h.c)).join(',');
  try{
    const r=await fetch('https://qt.gtimg.cn/q='+cs+'&_='+Date.now(),{cache:'no-store'});
    const t=await r.text(),d={};
    t.split(';').forEach(l=>{if(!l.includes('~'))return;const e=l.indexOf('=');if(e<0)return;d[l.slice(0,e).replace('var ','').trim()]=l.slice(e+2,l.lastIndexOf('"')).split('~')});
    return d;
  }catch{return null}
}

function rd(d){
  const s=mk();
  document.getElementById('tm').textContent=new Date().toLocaleTimeString('zh-CN');
  document.getElementById('mb').innerHTML=s.open?'<span class="badge bgo">🟢 交易中</span>':'<span class="badge bgc">🔴 已收盘</span>';
  document.getElementById('sd').className='dot'+(s.open?'':' off');
  document.getElementById('st').textContent=s.open?'实时':'盘后';
  
  if(!d){document.getElementById('sg').innerHTML='<div class="ld">⚠️ 数据获取失败</div>';return}
  
  let xh='';
  for(const [c,id] of Object.entries(IX)){
    const p=d['v_'+c];let v='--',ch='--',cl='#94a3b8';
    if(p&&p.length>4){const pr=+p[3]||0,cls=+p[4]||pr,cg=cls?((pr-cls)/cls*100):0;v=pr.toFixed(2);ch=(cg>0?'+':'')+cg.toFixed(2)+'%';cl=cg>0?'#ef4444':cg<0?'#34d399':'#94a3b8'}
    xh+=`<div class="ixi"${c==='sh000688'?' style="border:1px solid #334155"':''}><div class="n">${c==='sh000688'?'<span style="color:#38bdf8">科创50 🚀</span>':IXN[c]}</div><div class="v" style="color:${cl}">${v}</div><div class="p" style="color:${cl}">${ch}</div></div>`;
  }
  document.getElementById('ixg').innerHTML=xh;
  
  let sh='';
  for(const h of H){
    const p=d['v_'+h.c];let pr=0,cg=0,ps='--',cs='--',cf='fl';
    if(p&&p.length>4){const pv=+p[3]||0,cv=+p[4]||pv;cg=cv?((pv-cv)/cv*100):0;pr=pv;ps=pv.toFixed(2)+(h.k?' <span style="font-size:10px;color:#64748b">HKD</span>':'');cs=(cg>0?'+':'')+cg.toFixed(2)+'%';cf=cg>0.5?'up':cg<-0.5?'dn':'fl'}
    let tg='th',tt='持有';
    if(cg>5){tg='tb';tt='🔥强势'}else if(cg>2){tg='tb';tt='📈上涨'}else if(cg<-3){tg='tw';tt='⚠️关注'}
    const bc=cg>0?'#ef4444':cg<0?'#34d399':'#64748b',lt=pr===0?'加载中...':(cg>0?'✅ ':'💧 ')+h.l;
    sh+=`<div class="sc"><div class="l"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${bc}"></span> ${h.d}</div><div class="pr"><span class="n">${ps}</span><span class="c ${cf}">${cs}</span></div><div class="i">${lt}</div><div class="i">⚠️ ${h.r}</div><div class="t ${tg}">${tt}</div></div>`;
  }
  document.getElementById('sg').innerHTML=sh;
  
  // 新闻
  document.getElementById('nc').innerHTML=[
    {t:'7/10',g:'🚨氦气出口禁令',x:'商务部+海关总署：对氦气实施临时禁止出口管理→战略地位提升',c:'#ef4444'},
    {t:'今',g:'深科技',x:'两天+19.7%，验证封测铲子逻辑',c:'#ef4444'},
    {t:'今',g:'金宏',x:'氦气出口禁令→战略地位提升，36支撑',c:'#ef4444'},
    {t:'今',g:'华大',x:'基因测序回暖+4.63%',c:'#ef4444'},
    {t:'今',g:'泰格医药',x:'CXO放量+8.79%，高盛目标价77元',c:'#ef4444'},
    {t:'昨夜',g:'美股',x:'纳指+1.30%，科技强势',c:'#ef4444'},
    {t:'7/9',g:'科创50',x:'+8.41%创纪录！中芯+13.74%',c:'#ef4444'},
  ].map(x=>`<div class="ni"><span class="nx">${x.t}</span><span class="nt" style="color:${x.c}">${x.g}</span><span class="ntx">${x.x}</span></div>`).join('');
  
  // 分析
  document.getElementById('ac').innerHTML=[
    {t:'💊',x:'泰格医药 +8.79%放量！CXO卖水人逻辑，全球投融资回暖+降息催化，高盛目标价77元',p:'ab'},
    {t:'🚨',x:'商务部禁氦气出口：中国90%靠进口→战略地位提升，金宏直接受益',p:'ab'},
    {t:'🔥',x:'深科技验证封测铲子逻辑，HBM挤压DRAM→封测需求增',p:'ab'},
    {t:'💡',x:'华大加速，基因测序是AI医疗最直接应用',p:'ab'},
    {t:'📊',x:'中芯(H股)85.6HKD，大涨后整理，逻辑不变',p:'ah'},
    {t:'🌍',x:'纳指+1.30%+日经+1.77%→全球科技共振仍在',p:'ah'},
    {t:'⚠️',x:'金宏36支撑位，氦气出口禁令可能催化反弹',p:'aw'}
  ].map(x=>`<div class="ai"><span class="at ${x.p}">${x.t}</span><span class="ntx">${x.x}</span></div>`).join('');
  
  // 关注方向
  document.getElementById('wc').innerHTML=`<div class="wc"><div class="wt">🔬 半导体设备 <span class="wk wh">hot</span><span class="wk wn">新方向</span></div><div class="wr">设备是国产替代最薄弱环节。参考：北方华创/中微公司/拓荆科技</div></div><div class="wc"><div class="wt">💊 **泰格医药(CXO)** <span class="wk wh">hot</span><span class="wk wn">新方向</span></div><div class="wr">CXO是医药"卖水人"逻辑。全球投融资Q2回暖+降息催化+PE历史低位。确定性最高的医药反转标的。今日+8.79%放量突破。</div></div><div class="wc"><div class="wt">📦 AI应用 <span class="wk wd">趋势</span></div><div class="wr">AI硬件涨完→软件接力。参考：金山办公/用友/科大讯飞</div></div><div class="wc"><div class="wt">⚡ 固态电池 <span class="wk wh">hot</span></div><div class="wr">下一代电池技术，产业化加速期。参考：宁德时代/当升科技/容百科技</div></div>`;
  
  // 连板
  rl();
}

function rl(){
  const d=LBD.data,ds=Object.keys(d).sort();
  const w=document.getElementById('ladderWrap');
  
  if(!ds.length){
    w.innerHTML='<div class="ld">暂无连续2天以上涨停的股票</div>';
    document.getElementById('ls').innerHTML='<span style="color:#64748b">最近60个交易日无连板数据</span>';
    return;
  }
  
  // 收集所有出现过2+连板的股票
  const sm={};
  ds.forEach(date=>{
    const dd=d[date];
    if(!dd||!dd.stocks)return;
    dd.stocks.forEach(s=>{
      if(!sm[s.code])sm[s.code]={name:s.name,sector:s.sector,days:{}};
      sm[s.code].days[date]=s.streak;
    });
  });
  
  const codes=Object.keys(sm);
  const showDates=ds.slice(-Math.min(60,ds.length));
  
  // Sort by latest streak desc
  codes.sort((a,b)=>{
    const la=sm[a],lb=sm[b];
    const lda=showDates.filter(d=>la.days[d]).pop();
    const ldb=showDates.filter(d=>lb.days[d]).pop();
    return (ldb?lb.days[ldb]:0)-(lda?la.days[lda]:0)||la.name.localeCompare(lb.name);
  });
  
  // Build table
  let th='<tr><th style="color:#64748b;text-align:left;padding:4px 6px;font-weight:400;position:sticky;left:0;background:#0f172a">股票</th>';
  showDates.forEach(d=>{th+=`<th style="color:#334155;text-align:center;padding:4px 2px;font-weight:400;font-size:9px">${d.slice(5)}</th>`});
  th+='</tr>';
  
  let tb='';
  codes.forEach(code=>{
    const s=sm[code];
    const st=s.sector==='科创板'?'<span style="color:#38bdf8;font-size:9px">科创</span>':s.sector==='创业板'?'<span style="color:#34d399;font-size:9px">创业</span>':'';
    tb+=`<tr><td style="padding:4px 6px;white-space:nowrap;position:sticky;left:0;background:#0f172a"><span style="font-weight:600">${s.name}</span> ${st}</td>`;
    
    showDates.forEach((date,i)=>{
      const sk=s.days[date];
      if(sk){
        let bg='#f97316',fg='#fff';
        if(sk>=7){bg='#dc2626'}else if(sk>=5){bg='#ef4444'}else if(sk>=4){bg='#f97316'}else if(sk>=3){bg='#eab308';fg='#0f172a'}else{bg='#475569';fg='#e2e8f0'}
        const pd=i>0?showDates[i-1]:null,ps=pd?s.days[pd]:0;
        const nd=i<showDates.length-1?showDates[i+1]:null,ns=nd?s.days[nd]:0;
        tb+=`<td style="text-align:center;padding:2px">
          <div style="display:inline-flex;align-items:center;gap:0">
            ${ps&&sk?'<span style="color:#475569;font-size:8px">─</span>':''}
            <span style="display:inline-block;background:${bg};color:${fg};border-radius:3px;padding:1px 5px;font-size:10px;font-weight:700">${sk}</span>
            ${ns&&sk?'<span style="color:#475569;font-size:8px">─</span>':''}
          </div>
        </td>`;
      }else{
        tb+='<td style="text-align:center;padding:2px"><span style="color:#1e293b">·</span></td>';
      }
    });
    tb+='</tr>';
  });
  
  w.innerHTML='<table style="width:100%;border-collapse:collapse;font-size:11px;min-width:400px"><thead>'+th+'</thead><tbody>'+tb+'</tbody></table>';
  
  const total=codes.length;
  const maxSk=Math.max(...codes.map(c=>Math.max(...Object.values(sm[c].days))),0);
  document.getElementById('ls').innerHTML='<span style="color:#ef4444">📊 连板股票: '+total+'只</span> <span style="color:#f97316">📈 最高: '+maxSk+'板</span> <span style="color:#64748b">🕐 '+LBD.update_time+'</span>';

  // 补充柱状图显示：60日涨停数量分布
  showStats(d, showDates);
}

function showStats(d, dates){
  // 简单统计
}

function rf(){
  const s=mk();
  document.getElementById('st').textContent='刷新中...';
  document.getElementById('sg').innerHTML='<div class="ld"><span class="sp"></span>获取数据...</div>';
  fd().then(d=>{rd(d);cd(s.open?30:nh())});
}

function nh(){
  const n=new Date();
  return Math.max(60,Math.floor((new Date(n.getFullYear(),n.getMonth(),n.getDate(),n.getHours()+1,0,0,0)-n)/1000));
}

function cd(s){
  if(window._t)clearInterval(window._t);
  let r=s;
  window._t=setInterval(()=>{r--;
    const st=mk();
    document.getElementById('cd').textContent=st.open?`${r}s`:`${new Date(Date.now()+r*1000).getHours().toString().padStart(2,'0')}:00 (${Math.floor(r/60)}分)`;
    if(r<=0){clearInterval(window._t);rf()}},1000);
}

rf();
</script>
</body>
</html>
