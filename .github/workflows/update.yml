name: 更新Dashboard
on:
  schedule:
    - cron: '*/2 1-7 * * 1-5'
    - cron: '*/30 0-1,7-23 * * 1-5'
    - cron: '*/30 * * * 0,6'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate
        run: python generate.py > index.html
      - name: Commit
        run: |
          git config user.name "Dashboard Bot"
          git config user.email "bot@timmmmmo.github.io"
          git add index.html
          git diff --staged --quiet || git commit -m "auto: update $(date '+%Y-%m-%d %H:%M')"
          git push
