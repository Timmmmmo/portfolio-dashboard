name: 更新Dashboard
on:
  schedule:
    - cron: '0 * * * *'  # 每整点
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 全市场连板扫描
        run: python lianban_scanner.py > lianban_data.json 2>&1

      - name: 财联社新闻抓取
        run: python news_fetcher.py > news_data.json 2>&1

      - name: 持仓跟踪分析
        run: python portfolio_tracker.py > portfolio_data.json 2>&1

      - name: 更新到index.html
        run: |
          python3 << 'PYEOF'
          import json, re
          
          with open('lianban_data.json') as f: lb = json.load(f)
          with open('news_data.json') as f: news = json.load(f)
          
          with open('index.html') as f: html = f.read()
          
          lb_str = json.dumps(lb, ensure_ascii=False)
          html = re.sub(r'const LBD = \{.*?\};', f'const LBD = {lb_str};', html, flags=re.DOTALL)
          
          news_str = json.dumps(news, ensure_ascii=False)
          html = re.sub(r'const NEWS_DATA = \{.*?\};', f'const NEWS_DATA = {news_str};', html, flags=re.DOTALL)
          
          with open('index.html', 'w') as f: f.write(html)
          
          print(f'LBD: {lb["days"]}d, News: {news["total"]}')
          PYEOF

      - name: 提交更新
        run: |
          git config user.name "Dashboard Bot"
          git config user.email "bot@timmmmmo.github.io"
          git add index.html lianban_data.json news_data.json
          git diff --staged --quiet || git commit -m "auto: update $(date '+%Y-%m-%d %H:%M')"
          git push